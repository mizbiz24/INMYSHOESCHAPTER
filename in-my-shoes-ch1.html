#128557; the call log destroyed me</span>\n  <span class=\"rx\">&#129653; abby deserves the world</span>\n  <span class=\"rx\">&#128148; \"doing everything right\"</span>\n  <span class=\"rx\">\u2728 dean sees everything</span>\n  <span class=\"rx\">&#129293; the house metaphor</span>\n  <span class=\"rx\">\u2614 i felt this in my chest</span>\n</div>\n\n<!-- END CARD -->\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#129767;</span>\n  <p class=\"end-title\">\u2014 end of abby's introduction \u2014</p>\n  <p class=\"end-meta\">\n    for the ones who are still at the stop,<br>\n    watching the road, waiting for something<br>\n    that might not be coming back. &#129293;<br><br>\n    <em>next: Chapter 1 \u2013 \"Later\" \u00b7 Abby</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; 2.9K</span>\n</div>",
  lauren: "\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 INTRO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"intro-head\">\n  <span class=\"intro-label\">Introduction</span>\n  <span class=\"intro-title\">Some People Enter a Room. Lauren Arrives.</span>\n</div>\n\n<p class=\"opener\">I've spent a lot of time watching people. It's not something I decided to do \u2014 it's just what happens when you're the kind of person who exists mostly at the edges. You get good at reading rooms. You start to notice the things people don't announce.</p>\n\n<p>Lauren, I noticed from the very first time we ended up in the same space, was someone who announced everything.</p>\n\n<p>Not loudly. Not in the way that demands attention. But in the way that some people just \u2014 carry their whole self with them everywhere they go, and the room rearranges itself slightly to make room. She walked like she had a playlist running. She talked like she was always mid-sentence in a conversation that had been going on for years. She laughed the way people do when they've decided that laughing first is easier than being caught off guard.</p>\n\n<p>That's the first thing I noticed about Lauren.</p>\n\n<p class=\"line\">She was always first.</p>\n<p class=\"line\">First to laugh. First to clap at a performance. First to notice when someone was having a bad day and make a joke about it to diffuse the tension \u2014 not cruelly, just strategically. Like she'd calculated the exact angle needed to redirect the energy.</p>\n\n<p>She had a folder. Always. The kind with plastic sleeves, color-coded tabs, a schedule tucked in the front pocket. I don't think I've ever seen her without it. It became, over time, sort of an extension of her \u2014 this physical proof that she was organized, prepared, always somewhere to be and a plan for getting there.</p>\n\n<p>It was only later that I understood what the folder actually was.</p>\n\n<p>A prop. Not in the bad way. In the way that some people carry something physical just to have something to hold.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 1: The Fandom -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">One</span>\n  <span class=\"sec-title\">Stan Culture and the Art of Having Something to Love</span>\n</div>\n\n<p>The thing you need to understand about Lauren is that she loved things fully. Not casually. Not in the half-interested way most people approach hobbies. When Lauren was into something, she was <em>into</em> it \u2014 schedules, spreadsheets, Discord servers, fan accounts with matching usernames, the whole architecture of organized devotion.</p>\n\n<p>K-pop, mostly. But not just one group \u2014 she rotated, committed, then rotated again, each time with the same intensity, like she had an infinite reserve of it. She'd been in the fan club for three different groups simultaneously at one point, somehow maintaining separate group chats for each, buying albums with different versions to get different photocards, tracking comeback dates the way other people track exam schedules.</p>\n\n<!-- kpop ticker \u2014 Lauren's internal world -->\n<div class=\"ticker-wrap\">\n  <div class=\"ticker\">\n    <span class=\"ticker-item\">comeback in 12 days <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">limited photocard version B <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">fan meet ticket drop 8pm <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">stream goals: 1M by midnight <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">new fancam just dropped <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">group order closes tomorrow <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">he looked at the camera at 2:47 <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">comeback in 12 days <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">limited photocard version B <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">fan meet ticket drop 8pm <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">stream goals: 1M by midnight <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">new fancam just dropped <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">group order closes tomorrow <span class=\"dot\">\u00b7</span></span>\n    <span class=\"ticker-item\">he looked at the camera at 2:47 <span class=\"dot\">\u00b7</span></span>\n  </div>\n</div>\n\n<p>I used to think it was just a hobby. Something to do. And maybe it was, partly. But watching her talk about it \u2014 the way her face changed, the way the energy shifted \u2014 I started to understand it differently.</p>\n\n<p>When Lauren talked about her idols, she talked about them the way other people talk about the version of life they're still waiting for. The comeback date felt urgent because it was the thing she was counting down to. The fancam felt personal because she'd watched it enough times that she'd started to see things in it \u2014 the way he adjusted his earpiece before a high note, the exact moment the camera caught him laughing at something off-stage. Details that accumulated into a kind of intimacy that only worked in one direction.</p>\n\n<div class=\"hugot\">\n  <p>That's what fandoms are, I think. A place where you're allowed to love something completely, without the risk of it leaving. The idol doesn't know you exist. Which means they can't disappoint you the way people who do know you exist can.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>She had this whole theory about K-dramas, too. About how they were the only genre of story that got it right \u2014 the slow burn, the meaningful glances, the moment where everything that had been building for eight episodes finally broke open in a bus stop in the rain and someone said the thing they'd been not-saying the entire time.</p>\n\n<div class=\"dl\">\"That's how it should work,\" she said once, to a group of people, matter-of-factly, like she was explaining gravity. \"You meet, there's tension, there's a misunderstanding, there's a moment where it almost ends \u2014 and then it doesn't.\"</div>\n\n<p>Someone asked her if that ever happened in real life.</p>\n\n<p>She laughed. Fully. Generously. Like it was the funniest thing she'd ever heard.</p>\n\n<div class=\"dl\">\"Of course not,\" she said. \"That's why we have dramas.\"</div>\n\n<p>But the way she said it \u2014 just a fraction of a second too fast \u2014 told a different story.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 2: The Body -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Two</span>\n  <span class=\"sec-title\">The Part She Doesn't Talk About</span>\n</div>\n\n<p>Here's the thing about being the funny one, the loud one, the one with the energy and the folder and the infectious laugh: nobody asks how you're doing. Not really. Because you always seem fine. You seem better than fine. You seem like someone who is actively generating their own good mood and sharing the surplus with everyone around them.</p>\n\n<p>It takes a while to notice the seams.</p>\n\n<p>Lauren was \u2014 and I'm going to say this the way she would want it said, which is plainly \u2014 bigger than what the dramas said the lead was supposed to look like. She knew it. Of course she knew it. You don't live in this world, watching the same stories unfold on screens and in fan edits and in the way certain people get looked at when they walk into a room, without understanding exactly where you fall on the map.</p>\n\n<p>She never said it out loud. That was the thing. She'd make the joke before anyone else could \u2014 something self-aware, something that acknowledged it before it could be used against her, something that made the room laugh and kept the conversation moving. She was good at that. The strategic redirect. The preemptive laugh.</p>\n\n<div class=\"hugot\">\n  <p>There's a kind of armor that looks like confidence. It fits perfectly. It's very convincing. The only way to tell it from the real thing is that the real thing doesn't need to be worn \u2014 it just is. Armor, you have to put on every morning.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>I saw it sometimes \u2014 in the split second between the laugh and whatever came after it. The reset. The way she'd recalibrate. The same way someone smiles at a camera, and the second the flash goes off, their face returns to something quieter and more honest before they remember to hold the expression.</p>\n\n<p>She wanted the K-drama story. She'd said so, half-joking, a hundred times. The bus stop. The rain. The person who finally sees her the way she's been waiting to be seen.</p>\n\n<p>She just didn't fully believe it was available to her.</p>\n\n<p class=\"line\">Not because she wasn't worth it.</p>\n<p class=\"line\">But because nobody had ever made her feel like she was.</p>\n<p class=\"line\">Not yet.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 3: Rein -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Three</span>\n  <span class=\"sec-title\">His Name Was Rein</span>\n</div>\n\n<p>I'm going to tell this part carefully, because Lauren deserves that.</p>\n\n<p>His name was Rein. Student council president, consistent dean's lister, the kind of person who walked into rooms and immediately became the reference point for everyone else in them. Not because he was loud \u2014 he wasn't. But there's a kind of quiet that takes up more space than noise does, and Rein had that.</p>\n\n<p>He was, objectively, the male lead of someone's story. Just \u2014 it turned out that story and Lauren's story were not the same story.</p>\n\n<p>At least not for him.</p>\n\n<p>It started the way these things do \u2014 incidentally. They ended up near each other because of an event, or a project, or the kind of bureaucratic overlap that puts two people in the same room for long enough that one of them starts paying attention to the other. Rein did something. I don't know exactly what \u2014 Lauren never fully told it straight, always slightly around the edges of it, the way you describe a dream that's already starting to fade.</p>\n\n<p>But something happened. Something small, probably. The kind of thing he forgot about by the time he got home.</p>\n\n<div class=\"memory\">\n  <p>The way she told it once, quietly, to Abby, late in a semester when the building was mostly empty: he remembered something she'd mentioned in passing. Just \u2014 brought it up later, naturally, like it was information worth keeping. Like she was someone whose details were worth retaining.</p>\n  <p>That was it. That was the whole thing.</p>\n  <p>For Lauren, it was enough.</p>\n</div>\n\n<p>The problem with being someone who loves things fully is that you apply the same intensity to everything. The comeback countdown. The fan meet. The one afternoon when a boy looked at you like you were a person worth paying attention to.</p>\n\n<p>She became, quietly, his biggest fan.</p>\n\n<p>Not in a way anyone could see from the outside \u2014 she was too self-aware for that, too practiced at the redirect. She showed up to events where she knew he'd be without making it obvious she'd checked. She tracked his student council updates the way she tracked comeback schedules. She saved screenshots the way she saved photocard photos \u2014 not to show anyone, just to have.</p>\n\n<div class=\"hugot\">\n  <p>The hardest part about one-sided things isn't the rejection. It's the waiting. The way you keep giving weight to moments that were weightless for the other person. The way you construct a whole story out of material that was never meant to be a story.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>And Rein \u2014 he wasn't cruel about it. That would've been easier, in a way. He was just normal. Occasionally present. Occasionally warm in the general way that people with good manners are warm. He noticed her the way you notice furniture in a room you like \u2014 it's part of the atmosphere. You'd probably miss it if it was gone. But you don't think about it.</p>\n\n<p>Lauren thought about it.</p>\n\n<p>She thought about it the way she thought about everything she loved \u2014 completely, and in detail, and often at 2am when she should have been sleeping.</p>\n\n<p class=\"line\">She didn't look like the lead of the story she was living in.</p>\n<p class=\"line\">But she felt every single frame of it.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 4: The Day with the Mud -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Four</span>\n  <span class=\"sec-title\">The Day I Actually Saw Her</span>\n</div>\n\n<p>I've known about Lauren the way you know about people who exist in your general orbit \u2014 by proximity, by context, by the accumulated impression you get from watching someone move through shared spaces over time.</p>\n\n<p>But the day I actually <em>saw</em> her was the afternoon of the truck and the mud and the rain that didn't care about anyone's plans.</p>\n\n<p>We were inside the convenience store \u2014 Keith and I at the window, watching the street the way you watch things when you're warm and everyone outside is wet. And then a truck passed too fast, and the wave of water it sent across the sidewalk caught her mid-stride.</p>\n\n<p>I watched her stop. Look down at herself. Look up at the truck. Look back down.</p>\n\n<p>She stood there for one full second in which her entire face went through something \u2014 the surprise, the inventory of damage, the brief flash of something that looked like it might become tears or might become nothing \u2014 and then she laughed.</p>\n\n<p>Not performed. Not strategic. Just \u2014 laughed. The short, helpless kind. The kind that comes out when the universe has done something so perfectly terrible that the only reasonable response is to find it funny.</p>\n\n<p>Then she pushed open the door and came inside, mud-splashed folder and all.</p>\n\n<div class=\"dl\">\"Carlo,\" she said immediately, heading for the counter. \"Please tell me you have tissue.\"</div>\n\n<div class=\"dl\">\"Aisle two,\" Carlo said. \"Same spot as the heartbreak and the cold medicine.\"</div>\n\n<div class=\"dl\">\"Why is everything in aisle two always about suffering,\" she muttered, already walking there.</div>\n\n<p>Keith, next to me, watched her go.</p>\n\n<div class=\"dl\">\"Live comedy show,\" he said quietly, sipping the last of his melted ice cream.</div>\n\n<div class=\"dl\">\"Don't,\" I said.</div>\n\n<div class=\"dl\">\"I'm appreciating it.\"</div>\n\n<p>But I wasn't laughing. I was watching the way she'd assessed the damage to the folder first, before the jeans \u2014 the way she'd turned it over in her hands, checking if the contents were okay, with the same care she probably gave her photocard binders.</p>\n\n<p>She came back from aisle two with tissue, and I watched her clock Abby at the back table \u2014 the shift that went through her, the way she recalibrated her whole trajectory without announcing it \u2014 and then she sat down across from her like it was the most natural thing in the world.</p>\n\n<p>The tissue pack went between them. Something quiet was said. Abby laughed \u2014 a real one, the kind that means something \u2014 and Lauren looked satisfied in the way people do when they've done the thing they came to do, even if nobody asked them to.</p>\n\n<div class=\"hugot\">\n  <p>That's the thing about Lauren that I don't think she fully sees about herself. She shows up for people. Even soaking wet, folder destroyed, dignity technically questionable \u2014 she clocks the person who needs something and she goes. Not because it's her job. Just because that's who she is.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>She stayed with Abby until the color came back to Abby's face. Then she went to the counter and argued cheerfully with Carlo about whether aisle two was cursed or just overloaded, which made him laugh \u2014 actual, unguarded \u2014 for the first time since we'd come in.</p>\n\n<p>She bought herself a coffee milk. She stood by the door for a moment, looking at her folder one more time, already calculating whether the damage was recoverable or if she'd need a new one.</p>\n\n<p>Then she tucked it under her arm like a trophy.</p>\n\n<p>Pushed the door open.</p>\n\n<p>Walked back out into the rain.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<p>I watched her go.</p>\n\n<p>Keith was saying something beside me \u2014 something about the rain, or the ice cream, or the entropy of afternoons in general. I caught the pieces of it without following the whole thing.</p>\n\n<p>I was thinking about Lauren and the folder and the way she'd laughed when the truck soaked her \u2014 that fraction of a second where something real showed through before the performance came back up.</p>\n\n<p>I was thinking about Rein, and the way she probably had a screenshot of something small he'd said saved somewhere on her phone, and the way she probably told herself it didn't mean as much as it did, and the way she probably still looked for him in every room she entered.</p>\n\n<p>I was thinking that Lauren had this whole story happening inside her, this whole drama with all the right elements \u2014 the longing, the details, the carefully maintained hope \u2014 and nobody in it seemed to know they were a character in it.</p>\n\n<p>Not even Rein.</p>\n\n<p>Maybe especially not Rein.</p>\n\n<div class=\"hugot\">\n  <p>The K-drama she wanted so badly was already happening. She just hadn't been cast as the lead in anyone else's version of it yet. And that \u2014 the gap between how much she felt and how little of it landed anywhere \u2014 was the quietest, most persistent ache about her.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>Outside, the rain kept going.</p>\n\n<p>Lauren disappeared around the corner, folder under her arm, coffee milk in hand, walking like she had somewhere to be even if she didn't.</p>\n\n<p class=\"line\">That was Lauren.</p>\n<p class=\"line\">Always moving. Always planning. Always the loudest person in the room.</p>\n<p class=\"line\"><em>Always the last one anyone thought to look after.</em></p>\n\n<!-- REACTIONS -->\n<div class=\"rxns\">\n  <span class=\"rx\">&#128557; the folder as a prop i'm crying</span>\n  <span class=\"rx\">&#129655; she deserves everything</span>\n  <span class=\"rx\">&#128148; rein wake up</span>\n  <span class=\"rx\">\u2728 dean sees everyone</span>\n  <span class=\"rx\">&#128257; the kpop ticker detail</span>\n  <span class=\"rx\">\u2614 i am lauren</span>\n</div>\n\n<!-- END CARD -->\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#127800;</span>\n  <p class=\"end-title\">\u2014 end of lauren's introduction \u2014</p>\n  <p class=\"end-meta\">\n    if you've ever loved something harder than it loved you back,<br>\n    this one was written for you. &#129293;<br><br>\n    <em>next: Chapter 1 \u2013 \"The Girl with the Folder\" \u00b7 Lauren</em><br><br>\n    <em>(ps. rein shows up. that's all i'll say.)</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; 2.8K</span>\n</div>",
  carlo: "\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 INTRO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"intro-head\">\n  <span class=\"intro-label\">Introduction</span>\n  <span class=\"intro-title\">The Ones Who Can't Afford to Stop</span>\n</div>\n\n<p class=\"opener\">There's a version of strength that looks like keeping going. Not the dramatic kind \u2014 not the kind that makes speeches or breaks down and rebuilds in the third act. Just the quiet, structural kind. The kind that shows up for every shift, counts the change correctly, says something kind to every person who walks through the door, and then goes home and does it again tomorrow.</p>\n\n<p>Carlo had that kind.</p>\n\n<p>I noticed it the way I notice most things \u2014 slowly, then all at once. At first he was just the guy behind the register at the convenience store Keith dragged me to every other week. Blue polo. Dark circles. The particular expression of someone who has processed enough interactions to move through them efficiently without being rude about it.</p>\n\n<p>But the more I watched \u2014 and I always watch, it's the one thing I'm reliably good at \u2014 the more I understood that what I was looking at wasn't just someone working a job.</p>\n\n<p>I was looking at someone holding a life together with both hands and not telling anyone about it.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 1 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">One</span>\n  <span class=\"sec-title\">The Schedule</span>\n</div>\n\n<p>Keith was the one who first mentioned it, offhandedly, the way he mentions everything \u2014 like information is just weather, something that passes through.</p>\n\n<div class=\"dl\">\"Carlo's here like every time we come,\" he said once, eating his ice cream without looking up. \"Morning shift, afternoon shift, sometimes closing. I think he also tutors somewhere.\"</div>\n\n<div class=\"dl\">\"How do you know that?\" I asked.</div>\n\n<div class=\"dl\">\"I asked him once,\" Keith said. Like it was obvious. Like asking people things was just something you did.</div>\n\n<p>I filed it away. Started paying closer attention.</p>\n\n<p>Carlo moved through his shifts with the efficiency of someone who had learned to compress rest into small margins \u2014 the two minutes between customers when he'd roll his shoulder and close his eyes briefly, not dramatically, just the way you reboot something that's been running too long. The way he'd eat standing up at the counter during lulls, something fast, something practical, food as fuel rather than pleasure.</p>\n\n<p>The way, when it was slow, he'd pull out a notebook \u2014 not for anything creative, just numbers. Calculations. The arithmetic of getting through a month.</p>\n\n<!-- schedule card -->\n<div class=\"schedule\">\n  <span class=\"schedule-label\">Carlo \u00b7 Any Given Week</span>\n  <div class=\"schedule-row crossed\">\n    <span class=\"schedule-time\">5:30 AM</span>\n    <span class=\"schedule-task\">wake up, check lola's billing</span>\n  </div>\n  <div class=\"schedule-row crossed\">\n    <span class=\"schedule-time\">6:00 AM</span>\n    <span class=\"schedule-task\">commute</span>\n  </div>\n  <div class=\"schedule-row crossed\">\n    <span class=\"schedule-time\">7:30 AM</span>\n    <span class=\"schedule-task\">opening shift, convenience store</span>\n  </div>\n  <div class=\"schedule-row crossed\">\n    <span class=\"schedule-time\">1:00 PM</span>\n    <span class=\"schedule-task\">afternoon classes</span>\n  </div>\n  <div class=\"schedule-row crossed\">\n    <span class=\"schedule-time\">4:30 PM</span>\n    <span class=\"schedule-task\">tutoring \u2014 grade 10 math</span>\n  </div>\n  <div class=\"schedule-row\">\n    <span class=\"schedule-time\">7:00 PM</span>\n    <span class=\"schedule-task\">evening shift, convenience store</span>\n  </div>\n  <div class=\"schedule-row\">\n    <span class=\"schedule-time\">10:30 PM</span>\n    <span class=\"schedule-task\">commute home</span>\n  </div>\n  <div class=\"schedule-row\">\n    <span class=\"schedule-time\">11:30 PM</span>\n    <span class=\"schedule-task\">study. sleep when possible.</span>\n  </div>\n</div>\n\n<p>I looked at that once \u2014 I happened to see the page, didn't mean to \u2014 and I didn't say anything. There's nothing to say to a schedule like that. It doesn't need commentary. It just needs to be understood for what it is: a map of how much someone is carrying and choosing not to mention.</p>\n\n<div class=\"hugot\">\n  <p>Some people are busy because they're ambitious. Some people are busy because the moment they stop, everything they've been outrunning catches up to them. The schedule is the same. The reason is different.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 2 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Two</span>\n  <span class=\"sec-title\">What Lola Remembers</span>\n</div>\n\n<p>Carlo grew up with his grandmother.</p>\n\n<p>That's the short version. The longer version involves a road, and an accident, and the specific kind of loss that happens when you're young enough that grief doesn't have language yet \u2014 it's just an absence that becomes architectural, something you build your whole life around without realizing that's what you're doing.</p>\n\n<p>His parents died when he was a kid. I don't know the exact details. I didn't ask. There are things you learn about people not by asking, but by paying attention to the shape their life takes \u2014 the outline of what's missing.</p>\n\n<p>His lola raised him. He grew up in her house, ate at her table, learned to navigate the world with her as the fixed point of it. And for a long time, that was enough. She was enough.</p>\n\n<p>Then the Alzheimer's came.</p>\n\n<p>It doesn't happen all at once. That's the thing about it that I think breaks people the most \u2014 not the ending, but the slowness of it. The way someone you love starts to become less themselves in increments so small you can argue with yourself for months about whether it's really happening. The way some days they're almost fully there and other days there's a fog behind their eyes that you can't reach through.</p>\n\n<p>And then, eventually, the fog is just where they live now.</p>\n\n<div class=\"memory\">\n  <p>Keith mentioned once that Carlo had told him \u2014 again, Keith just asks people things, it's remarkable \u2014 that there are days his lola doesn't know who he is. That she'll look at him with this polite, confused expression, the kind you give a stranger who's been very kind to you, and say something like, <em>you're a good boy, who did you say you were again?</em></p>\n  <p>And Carlo will say his name. And she'll nod like she's filing it away. And sometimes it sticks and sometimes it doesn't.</p>\n  <p>He visits when he can. Which is not as often as he wants.</p>\n</div>\n\n<p>She's in a home now. A good one, he makes sure of that \u2014 which is why the notebook has all those numbers in it, why the schedule looks the way it does, why there is no version of Carlo's life that involves slowing down.</p>\n\n<p>He is paying for the place where the last person who remembered him as a child is slowly forgetting that he exists.</p>\n\n<p>He does this without complaint.</p>\n\n<p>He does this like it's just what you do.</p>\n\n<div class=\"hugot\">\n  <p>I know something about growing up with a grandmother as the whole of your world. The particular security of it, and the particular fragility \u2014 the way you understand, even as a kid, that this arrangement has a different kind of ending than the ones other people have. You love them knowing that. You love them anyway. You just never get used to watching that ending approach.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 3 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Three</span>\n  <span class=\"sec-title\">Mira</span>\n</div>\n\n<p>There was a girl. Her name was Mira.</p>\n\n<p>I didn't know her. I know about her the way I know about most things in Carlo's life \u2014 from context, from absence, from the small tells that people leave behind when they're trying not to show that something happened.</p>\n\n<p>She came up once, sideways, when Lauren made a joke at the counter about heartbreak being in aisle two, and Carlo laughed \u2014 genuinely, the way you laugh when something is both funny and true \u2014 and for just a second, something crossed his face before he put it away.</p>\n\n<p>I noticed. I always notice. I just don't always say anything.</p>\n\n<p>They'd been together for a while, I think. Long enough that she knew the schedule. Long enough that she'd understood what she was agreeing to \u2014 the late shifts, the missed plans, the calls that went unanswered because he was in the middle of a tutoring session or a closing shift or standing at a bus stop at eleven-thirty at night eating a convenience store sandwich because it was either that or not eat.</p>\n\n<p>She'd understood it, and then eventually she hadn't anymore.</p>\n\n<p>Or maybe she'd always understood it and had just finally run out of ways to be okay with it. Those two things look the same from the outside.</p>\n\n<div class=\"memory\">\n  <p>The way I imagine it \u2014 and I'm only imagining, I want to be clear, I don't know the actual conversation \u2014 is that it wasn't a fight. Carlo didn't seem like someone whose relationships ended in fights. It probably ended quietly, the way things do when both people are too tired for drama. She probably said something true. He probably said something true back. And then there was nothing left to say, and she left, and he went to work the next morning because what else do you do.</p>\n  <p>You go to work. You count the change. You make a joke to the next person who walks in. You keep going.</p>\n  <p>Because the bills don't pause for breakups. The schedule doesn't have a line for grief.</p>\n</div>\n\n<p>That's the thing that gets me about Carlo.</p>\n\n<p>Not the loss of his parents \u2014 that's a tragedy, but it's one he processed so young that it became part of the foundation rather than something layered on top. Not even the grandmother, as quietly devastating as that is.</p>\n\n<p>It's the breakup. Because that one was recent. That one was still raw, still present, still a thing he was living inside of. And he wasn't letting himself live inside of it \u2014 he was outrunning it, shift by shift, tutoring session by tutoring session, because the moment you stop moving the thing catches up to you and you can't afford that, you genuinely cannot afford to fall apart right now, so you don't.</p>\n\n<div class=\"hugot\">\n  <p>Mira left because he was always somewhere else. And he was always somewhere else because the world he was holding together didn't have room for him to just be present in one place and feel things. That's not a villain origin story. That's just two people and an impossible situation and no one to blame and nowhere for the sadness to go except inward and forward, always forward, never stopping long enough to let it land.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 4 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Four</span>\n  <span class=\"sec-title\">What I Recognized</span>\n</div>\n\n<p>I want to be careful here because this is the part that's hard to say without making it sound like I'm making his story about me. I'm not. Carlo's life is heavier than mine in ways I don't have the right to flatten into a comparison.</p>\n\n<p>But I recognized something in him.</p>\n\n<p>The specific quality of someone who grew up having to be fine. Who learned early that falling apart was a luxury, that the people who needed things were the people who couldn't afford to need things, and so you became the person who didn't need anything, who always had something to offer, who made the joke and handed out the towel and said something kind at the register even at the end of a twelve-hour day.</p>\n\n<p>I recognized the way he occupied space \u2014 present everywhere, taking up room nowhere. The way he was available to everyone who came through the door and quietly, carefully unavailable for anything that would cost him something he didn't have.</p>\n\n<p>I recognized the tiredness that doesn't look like tiredness because it's been running so long it just looks like personality.</p>\n\n<p>I recognized myself.</p>\n\n<p>Not exactly. Not the same. But the shape of it \u2014 the outline \u2014 was familiar in a way that sat in my chest quietly and didn't move.</p>\n\n<div class=\"hugot\">\n  <p>The difference between me and Carlo is that I stepped back from people because I expected them to leave. Carlo stepped back because he was afraid that if he stayed too long in any one place, he'd run out of what he needed to keep everything else going. We both ended up in the same position \u2014 on the edges, present, not quite reachable \u2014 but we got there by different roads.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>The night of the rain, the night of the truck and the mud and Lauren's folder and Owen's scratched guitar case \u2014 I watched Carlo move through all of it. The tissue without being asked. The towel for Owen. The joke that made Lauren laugh at exactly the right moment. The particular quality of attention he gave each person who came through \u2014 not performed warmth, actual warmth, the kind that costs something.</p>\n\n<p>At one point, during a slow moment, he was standing at the counter with his notebook open, the same page of numbers he'd been looking at on and off all evening. He stared at it for a moment. Then he wrote something small in the margin. Closed it. Put it under the counter.</p>\n\n<p>Then the door chimed and he looked up and said something kind to whoever walked in.</p>\n\n<p>Just like that. The shift between the private moment and the public one \u2014 so fast, so practiced, so complete that if you blinked, you'd miss that the private moment had happened at all.</p>\n\n<p class=\"line\">I didn't blink.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<p>When Keith and I left that night, Keith did the thing he does \u2014 the small hand on the counter, the easy exchange \u2014 and Carlo smiled and said something about tradition, and it was all very normal and light and fine.</p>\n\n<p>But I looked at him one more time before the door closed behind us.</p>\n\n<p>He was already looking at the next customer. Already present. Already on.</p>\n\n<p>The notebook was under the counter.</p>\n\n<p>Mira's name was somewhere in the air that he'd already moved through.</p>\n\n<p>His lola was in a room somewhere, maybe remembering his name, maybe not.</p>\n\n<p>And Carlo was standing behind a register at ten-thirty at night with dark circles under his eyes and a joke ready for whoever walked in next, because that was the job, and the job was the thing, and the thing was what kept everything from collapsing, and so you did the thing.</p>\n\n<p>You kept doing the thing.</p>\n\n<div class=\"hugot\">\n  <p>There's a kind of courage that nobody names because it doesn't look like courage \u2014 it looks like just showing up. Just getting through. Just doing the next thing and the thing after that. But I've seen what the alternative looks like from the top of a staircase in the dark, and I know that showing up, again and again, when everything in you wants to not \u2014 that takes something. Something real. Something most people don't have and don't know they don't have until they need it.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>Carlo had it.</p>\n\n<p>He probably didn't know that about himself.</p>\n\n<p>The people who have it usually don't.</p>\n\n<p class=\"line\">They're too busy keeping going to notice that keeping going is the hard part.</p>\n<p class=\"line\">That it's the whole thing.</p>\n<p class=\"line\"><em>That it counts.</em></p>\n\n<!-- REACTIONS -->\n<div class=\"rxns\">\n  <span class=\"rx\">&#128557; the schedule card broke me</span>\n  <span class=\"rx\">&#128155; carlo deserves everything</span>\n  <span class=\"rx\">&#129293; \"the ones who can't afford to stop\"</span>\n  <span class=\"rx\">\u2728 dean sees himself in him</span>\n  <span class=\"rx\">&#128148; mira my heart</span>\n  <span class=\"rx\">&#128257; read this twice already</span>\n</div>\n\n<!-- END CARD -->\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#127769;</span>\n  <p class=\"end-title\">\u2014 end of carlo's introduction \u2014</p>\n  <p class=\"end-meta\">\n    for everyone who's ever had to put the grief<br>\n    somewhere it would fit in the schedule. &#129293;<br><br>\n    <em>next: Chapter 1 \u2013 \"Cold for Cold\" \u00b7 Carlo</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; 2.6K</span>\n</div>",
  owen: "\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 INTRO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"intro-head\">\n  <span class=\"intro-label\">Introduction</span>\n  <span class=\"intro-title\">The Kind of Person Who Carries Things Without Making It a Thing</span>\n</div>\n\n<p class=\"opener\">The first time I saw Owen, he was wet. Not dramatically \u2014 not movie-wet, not the kind of rain-soaked entrance that announces itself. Just \u2014 damp at the shoulders, shoes still dark from the puddle, hair pushed back in a way that suggested it had happened and he'd already decided to move on from it.</p>\n\n<p>He came through the door of the convenience store like he'd done it a thousand times. And I realized, watching him, that he probably had.</p>\n\n<p>That's the thing about Owen. Nothing about him announces itself. He doesn't walk into a room the way Lauren does \u2014 all energy and presence and the room adjusting. He doesn't have Carlo's specific quality of quiet industry either, that sense of someone running calculations at all times. Owen just \u2014 arrives. Already there. Already oriented. Already aware of what needs to happen next.</p>\n\n<p>Abby lit up when she saw him. That part I noticed first \u2014 the way she moved toward the door before she'd consciously decided to, the way she said his name like it was a sigh of relief dressed up as a greeting.</p>\n\n<div class=\"dl\">\"Kuya Owen!\"</div>\n\n<p>And Owen looked at her the way \u2014 the way you look at something you've been responsible for keeping safe for so long that it's stopped being a duty and become just the shape of how you exist in the world. Not soft, exactly. Just \u2014 certain. The way a door frame is certain. The way something structural is certain.</p>\n\n<p>I didn't know much about him yet. But I knew that look.</p>\n\n<p>I'd seen it in the mirror once or twice, on the days I was still capable of looking.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<p>Abby was already at the door when he came up the steps.</p>\n\n<div class=\"dl\">\"Kuya! What happened to you, you're soaked\u2014\"</div>\n<div class=\"dl\">\"I'm okay. Cassiopea took the hit.\"</div>\n<div class=\"dl\">\"The guitar??\"</div>\n<div class=\"dl\">\"Just a scratch. She's fine. Get inside.\"</div>\n\n<p>Carlo was at the counter. He saw them come in, saw the state of Owen, and reached under the register without a word \u2014 the way he does most things, without announcement \u2014 and put a folded hand towel on the counter.</p>\n\n<div class=\"dl\">\"Basang sisiw.\"</div>\n<div class=\"dl\">\"Basang saging.\"</div>\n<div class=\"dl\">\"Sit down, at least. Drying off standing up is inefficient.\"</div>\n\n<p>Owen sat. He set Cassiopea against the counter \u2014 gently, the way you set something gently that has already been hurt once tonight \u2014 and started toweling his hair with the specific carelessness of someone too tired to care what he looked like. There were two other people in the store. He registered them the way he registered most things, peripherally, efficiently. One quiet. One not.</p>\n\n<p>That was me. The quiet one. Keith was the other \u2014 working through a cookies and cream ice cream with the single-mindedness of a person for whom ice cream was currently the most important thing in the world. He looked up from it with genuine warmth, the way Keith looks at everything.</p>\n\n<div class=\"dl\">\"Owen! Bro. The man himself. What happened \u2014 did you fight the rain?\"</div>\n<div class=\"dl\">\"The rain won.\"</div>\n<div class=\"dl\">\"Classic. Hey \u2014 Dean, this is Owen. Abby's kuya. Kuya of everything, actually. Owen, Dean.\"</div>\n\n<p>Owen looked at me. I looked at him. The specific mutual assessment of two people deciding, in about three seconds, what to do with each other. He was still damp. The guitar case was against his knee. His hand rested on it automatically \u2014 not holding it, just in contact. A small continuous reassurance in both directions.</p>\n\n<div class=\"dl\">\"Hey.\"</div>\n<div class=\"dl\">\"Hey.\"</div>\n\n<p>Two words. Eye contact. The nod. That was it, and it was enough.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 1 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">One</span>\n  <span class=\"sec-title\">What Responsibility Looks Like at Age Eight</span>\n</div>\n\n<p>The parents left early. That's the cleanest way to say it \u2014 and I want to be clear that leaving for abroad isn't abandonment, isn't a failing, isn't something Owen holds against them. It was a decision made out of necessity, the way most decisions in that particular kind of family are. You go where the work is. You send money back. You call when you can.</p>\n\n<p>And they were responsible about it, at least at first. They didn't just leave two kids alone in a house and hope for the best. They arranged a caretaker \u2014 a relative, an ate from somewhere in the family tree, someone whose job was to be present in the ways they couldn't be. Cook, supervise, make sure the lights stayed on and the homework got done and nobody went to school hungry.</p>\n\n<p>The arrangement worked, technically. The basics were covered.</p>\n\n<p>Owen just \u2014 didn't like it.</p>\n\n<p>Not because the caretaker was unkind. More because of the specific way some people treat a responsibility that isn't really theirs \u2014 present but barely, doing the minimum, living her own life inside their house while technically fulfilling the obligation. The meals were there. The supervision was not. And Owen, who by ten years old had already developed a very precise radar for when something was form without substance, noticed. Filed it. Said nothing.</p>\n\n<p>He started doing things himself instead. Not dramatically \u2014 not as a statement, not to prove anything. Just quietly taking over the parts he thought he could handle, and then the parts he wasn't sure he could handle, and eventually the parts that were supposed to be someone else's job entirely. Because it was easier to do it himself than to watch it get done badly. Because it was faster. Because he was already there.</p>\n\n<p>By the time he was in first year high school, he'd done the math.</p>\n\n<div class=\"dl\">\"We don't need her anymore,\" he told his parents on a call. Not angry about it. Just stating a fact, the way he stated most things. \"Abby and I are fine. It's an extra expense.\"</div>\n\n<p>His parents hesitated. They worried, the way parents worry from twelve time zones away, over a bad connection, with the specific guilt of people who are doing their best from very far away and know it might not be enough.</p>\n\n<div class=\"dl\">\"Are you sure?\" his mother asked. \"Owen, ha \u2014 kung may kailangan kayo \u2014\"</div>\n\n<div class=\"dl\">\"Kaya namin,\" he said.</div>\n\n<p>Two words. Calm. Final. The conversation closed itself.</p>\n\n<p>And here's the thing \u2014 he wasn't wrong. They could. He'd already proven it, day by day, in the months before he ever made the call. He wasn't being reckless or proud or performing independence for an audience. He had looked at the situation, assessed it honestly, and concluded: <em>this is manageable. we are okay. the arrangement costs more than it provides.</em></p>\n\n<p>The caretaker left. Owen and Abby stayed.</p>\n\n<p>His parents trusted him because he had given them every reason to. Because he was thorough and calm and always had an answer when they asked, and the answer was always some version of <em>fine, we're fine, don't worry.</em> They weren't negligent \u2014 they were just, maybe, a little too willing to believe him. Because believing him was easier than the alternative, which was admitting that no arrangement they could make from that distance was ever going to be quite enough.</p>\n\n<p>Owen understood this. He'd understood it for years. He just never said so out loud, because what would be the point.</p>\n\n<p>You don't make it a thing. You make it work. You move on.</p>\n\n<!-- timeline -->\n<div class=\"timeline\">\n  <span class=\"timeline-label\">Owen \u00b7 The Growing Up</span>\n  <div class=\"tl-row\">\n    <span class=\"tl-age\">Age 8</span>\n    <span class=\"tl-detail\">parents leave. caretaker arrives. he watches her carefully.</span>\n  </div>\n  <div class=\"tl-row\">\n    <span class=\"tl-age\">Age 9\u201310</span>\n    <span class=\"tl-detail\">starts doing things himself. easier that way. faster.</span>\n  </div>\n  <div class=\"tl-row\">\n    <span class=\"tl-age\">Age 10</span>\n    <span class=\"tl-detail\">learns what budget means. memorizes which bills come when.</span>\n  </div>\n  <div class=\"tl-row\">\n    <span class=\"tl-age\">Age 12</span>\n    <span class=\"tl-detail\">makes kwentuhan with abby when she's scared at night. doesn't let on that he is too.</span>\n  </div>\n  <div class=\"tl-row\">\n    <span class=\"tl-age\">Age 14</span>\n    <span class=\"tl-detail\">calls parents. tells them they don't need the caretaker anymore. kaya namin.</span>\n  </div>\n  <div class=\"tl-row\">\n    <span class=\"tl-age\">Age 15</span>\n    <span class=\"tl-detail\">gets a part-time job. tells no one at school.</span>\n  </div>\n  <div class=\"tl-row\">\n    <span class=\"tl-age\">Now</span>\n    <span class=\"tl-detail present\">still going. still carrying. still mostly fine about it.</span>\n  </div>\n</div>\n\n<p>The word that keeps coming to me when I think about that version of Owen \u2014 the one before I met him, the one I can only construct from the shape of who he became \u2014 is <em>deliberate.</em> Nothing about his growing up was accidental. He didn't stumble into responsibility \u2014 he walked toward it, assessed it, and decided it was his. Each step was a choice, even the ones that didn't look like choices from the outside. Especially those.</p>\n\n<div class=\"hugot\">\n  <p>The most dangerous kind of strength is the kind you volunteer for. Because at least when strength is imposed on you, there's someone to blame, a story to tell, a reason why it wasn't your fault that you ended up carrying so much. But when you chose it \u2014 when you made the call, sent the caretaker home, said <em>kaya namin</em> with full conviction \u2014 you don't get to be a victim of it. You just get to be tired. And you don't even get to complain about the tired, because you picked this. You chose this. You were sure.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 2 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Two</span>\n  <span class=\"sec-title\">The Graduation (His)</span>\n</div>\n\n<p>Here is something Owen has never said to anyone, as far as I know. Something I'm only telling you because I think it matters for understanding the rest of him.</p>\n\n<p>Elementary graduation. The kind of ceremony that's small and a little formal and a lot about the parents in the audience who cry at things like this because their kid is growing up. The teacher calls the name. The parent comes forward. The medal goes around the neck. Everyone claps. Someone cries.</p>\n\n<p>They called Owen's name.</p>\n\n<p>He walked up. He stood still. He waited.</p>\n\n<p>Nobody came forward.</p>\n\n<div class=\"memory\">\n  <p>A teacher \u2014 kind, practical, the kind who had seen this before \u2014 stepped in and did it herself. She hung the medal like it was normal. She smiled at him like it was normal. He smiled back like it was normal.</p>\n  <p>He was ten. He already knew how to perform normal.</p>\n  <p>He walked back to his seat with the medal on his chest and he sat down and he watched the rest of the ceremony and he did not cry and he did not make it a thing because making it a thing would have made everyone else uncomfortable and that was, by then, already a reflex.</p>\n  <p>His parents found out later, the way they found out most things \u2014 after the fact, briefly, because he mentioned it in passing at the end of a call and then moved on before they could feel too bad about it. <em>Nag-graduate na ko, okay lang naman. Kumain na ba kayo dyan?</em> Subject changed. Done.</p>\n  <p>Don't make it a thing. Keep going. You're fine.</p>\n</div>\n\n<p>I don't know if his parents knew, after the fact, that they'd missed it. I don't know if there was a phone call that night where he said <em>I graduated today</em> and they said <em>anak, sana naroroon kami.</em> I don't know how he processed it \u2014 if he did at all, or if he filed it away the way he seemed to file most things that cost him something, neatly, under a label that said <em>already handled, moving on.</em></p>\n\n<p>What I do know is what he did, years later, when Abby graduated.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 3 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Three</span>\n  <span class=\"sec-title\">The Graduation (Hers)</span>\n</div>\n\n<p>He ironed a button-down. This is the detail that gets me every time I think about it \u2014 that he ironed it. That he put that specific care into it. That he stood in front of whatever mirror they had and decided he was going to do this right.</p>\n\n<p>He also wore a fake mustache. I don't know where he got it. I don't know if he bought it or borrowed it or made it from whatever was available \u2014 but he wore it. Stick-on, slightly crooked, the kind that is deeply, objectively ridiculous in a way that is clearly the entire point.</p>\n\n<p>Abby told me about it once. Not directly \u2014 it came out sideways, the way the things that mean most to her tend to come out, somewhere in the middle of a conversation that was about something else entirely.</p>\n\n<div class=\"dl\">\"He looked so tanga,\" she said. And then she laughed, and the laugh had something in it that wasn't just funny.</div>\n\n<p>He wore a formal shirt and a fake mustache to his little sister's graduation so that when they called her name, he could be the one who walked up. He could be the one who stood in front of her. He could hang the medal around her neck himself, with his own hands, in front of all those people, ridiculous and earnest and completely serious about it \u2014 the formal shirt for the ceremony, the mustache so she'd laugh instead of cry, so the moment would be warm instead of just present.</p>\n\n<p>So she would never know what it felt like to stand there and wait and have nobody come.</p>\n\n<div class=\"hugot\">\n  <p>That's the thing about people who were hurt quietly \u2014 they don't talk about it. They don't process it out loud or build a personality around their wound. They just find the person they love most and they turn the hurt into protection and they make sure, with everything they have, that the same thing doesn't happen to them.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>I think about that mustache a lot. The specific decision to be funny about something that could have been heavy. The understanding, at whatever age he was, that what Abby needed wasn't someone solemn in a formal shirt \u2014 she needed someone who showed up fully, who made the moment light, who gave her a story to tell later instead of just a memory to keep.</p>\n\n<p>He gave her the story.</p>\n\n<p>He kept the other one.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 4 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Four</span>\n  <span class=\"sec-title\">The Guitar</span>\n</div>\n\n<p>Here's what I noticed first, before anything else: he grabbed the guitar case before he checked his own hands.</p>\n\n<p>A tricycle had come too close to the curb \u2014 not a near-miss exactly, more the kind of splash that catches you sideways, cold water up the leg, the lurch of almost-something that leaves your heart briefly elevated. He stumbled. The case jerked. And his first instinct \u2014 immediate, unconscious, the kind that happens before thought \u2014 was to pull it in, protect it, check if it was okay.</p>\n\n<p>Then he checked himself. Then he walked in like nothing had happened.</p>\n\n<p>I clocked that. Filed it. Held it up against everything I'd learn about him later.</p>\n\n<p>The guitar is not just an instrument to Owen. I'm not sure he'd say that himself \u2014 he doesn't speak about things that way, in the kind of language that assigns significance. He'd probably shrug and say it was just something he picked up. But you can tell. The way something gets treated tells you everything about what it means.</p>\n\n<p>He started playing in high school. Not because someone pushed him toward it, not because it seemed cool, not because of a girl or a phase or any of the reasons people usually start. He started because there were things inside him that didn't have anywhere to go \u2014 and three chords on a borrowed guitar were something. A place to put it. A key that fit a lock he hadn't known he'd been carrying.</p>\n\n<p>The band came later. And the name \u2014 the name is a whole story by itself.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- BAND NAME SUBSECTION -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Four, cont.</span>\n  <span class=\"sec-title\">Steel Strain, or: How You End Up with a Name You Didn't Choose</span>\n</div>\n\n<p>The original name was <em>Steel Strain.</em> Owen came up with it \u2014 or rather, Owen and the other guys collectively landed on it after a process that probably involved a whiteboard and a lot of rejected options. It sounded like a band. Serious. A little hard. The kind of name you could put on a tarpaulin without feeling embarrassed about it.</p>\n\n<p>They were playing a small school event \u2014 one of those late-afternoon things in the covered court where the sound system is either too loud or not loud enough and the host is a student from a different department who was given a list of names twenty minutes before the program started.</p>\n\n<p>Keith told me the story later, still laughing.</p>\n\n<div class=\"dl\">\"The host walks up,\" he said, \"holding the paper like this \u2014\" he mimed squinting at something arm's-length away, \"\u2014 and goes: 'Everyone please welcome\u2026 <em>Still Trying.</em>'\"</div>\n\n<p>The band was already walking out when it happened. Owen stopped. Looked at the host. Looked back at his bandmates.</p>\n\n<div class=\"dl\">\"Steel Strain,\" he said, quietly, to no one in particular.</div>\n\n<div class=\"dl\">\"What?\" one of them said.</div>\n\n<div class=\"dl\">\"He said Still Trying.\"</div>\n\n<div class=\"dl\">\"I heard.\"</div>\n\n<p>A beat. Then someone in the crowd started clapping \u2014 not ironically, just clapping because the emcee had said a name and that's what you do \u2014 and the moment to correct it passed, and Owen looked at the host one more time, and the host was already moving on, already saying something into the mic about how excited everyone was, and so Owen just \u2014</p>\n\n<p>walked to his spot.</p>\n\n<p>Adjusted the strap. Checked the tuning. Counted them in.</p>\n\n<p>Afterwards, someone came up to them \u2014 a girl from the audience, a stranger, someone none of them knew \u2014 and said she'd really liked their set and that the name was <em>so them,</em> actually, that it felt really honest, like a band that wasn't trying to be cool, just trying to be good.</p>\n\n<p>Owen was quiet for a second when she said that.</p>\n\n<div class=\"dl\">\"Thanks,\" he said.</div>\n\n<p>She left. His bandmates looked at him.</p>\n\n<div class=\"dl\">\"We're keeping it, aren't we,\" one of them said. Not a question.</div>\n\n<p>Owen picked up the guitar case.</p>\n\n<div class=\"dl\">\"Steel Strain sounds like a protein supplement,\" he said.</div>\n\n<p>And that was that.</p>\n\n<div class=\"memory\">\n  <p>Keith swears Owen was annoyed about it for approximately forty-five minutes and then never mentioned Steel Strain again. Not because he'd fallen in love with the new name \u2014 more because Owen has a very specific relationship with things he can't change. He doesn't fight them. He looks at them, finds the part that's useful, and moves forward. It's the same thing he does with everything else. You make do. You find the angle. You decide that what you have is enough to work with.</p>\n  <p>Still Trying. Present tense. Not a declaration of victory. Not a cry for help. Just \u2014 an ongoing state. A report from the field. <em>Still here. Still at it. Haven't stopped yet.</em></p>\n  <p>If you were going to name a band after Owen's entire life philosophy, you could do a lot worse.</p>\n  <p>Honestly, you couldn't do better.</p>\n</div>\n\n<div class=\"hugot\">\n  <p>Sometimes the wrong name is the right one. Sometimes you don't get to choose what you're called \u2014 by a host who misread a paper, by a situation that needed someone and picked you, by the specific shape of the life you ended up living. And sometimes you look at the name, and you think: well. It fits. Not the way I would have chosen. But it fits.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>Music doesn't ask you to be okay. It doesn't require that you've already processed the thing before you can use it. You can be mid-weight, mid-carry, mid-exhaustion, and still play three chords and have them mean something. That's what makes it different from most things. Most things want you to show up already fine. Music lets you show up as you are.</p>\n\n<p>He plays at night, I think. After everything else is done \u2014 after the responsibilities have been met and Abby is okay and the practical things are handled. The guitar is the last thing, the one thing that belongs to him entirely, that doesn't have a function except to be his.</p>\n\n<p>He holds it the way someone holds the one thing in their life that is only theirs.</p>\n\n<p>Like it's the thing they'd protect first, even before themselves.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 5 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Five</span>\n  <span class=\"sec-title\">What I Noticed, Standing There</span>\n</div>\n\n<p>Carlo handed him a towel. Owen said thank you, dried his face first, then checked the case again. Abby hovered near him with the particular energy of someone who had been worried without knowing she was worried until the thing she was worried about walked through the door looking fine.</p>\n\n<p>He made a joke. Something short, something dry. She laughed. The worry left her face.</p>\n\n<p>He'd done that on purpose. I could tell. The whole sequence \u2014 the joke, the timing, the specific way he redirected her concern into laughter \u2014 was not accidental. It was practiced. The same instinct as the mustache, smaller scale. <em>Make it light before it can be heavy. Give them the laugh before they have time to ask if you're okay.</em></p>\n\n<p>Keith was already chatting at him, comfortable in the way Keith is comfortable with everyone. I watched Owen from slightly further back, the way I usually watch people \u2014 at the angle where they haven't adjusted for an audience yet.</p>\n\n<p>He looked tired.</p>\n\n<p>Not sleep-deprived exactly, though probably that too. But the deeper kind \u2014 the kind that doesn't come from one bad night, the kind that accumulates over years of being the person everyone can count on. The kind that sits behind the eyes and doesn't show up unless you know what you're looking for.</p>\n\n<p>I knew what I was looking for.</p>\n\n<div class=\"memory\">\n  <p>There's a version of this I recognize. Not the same biography \u2014 not the same losses, not the same structure. But the posture. The way a person occupies a room when they've spent long enough being someone else's safe person that they've forgotten to notice whether they have one themselves.</p>\n  <p>The competence that functions as a wall. The humor that functions as a redirect. The fine-ness that gets used so often it becomes structural, load-bearing, the kind you can't put down even when you're alone because you've stopped knowing how.</p>\n  <p>Owen wasn't broken. That matters. I want to be precise about this. He wasn't broken \u2014 he was tired, which is different. Tired can still move. Tired can still play three chords at night and mean it. Tired is not the same as done.</p>\n  <p>But tired, when it goes unaddressed long enough, starts to look like personality. And the saddest thing isn't the weight. It's the person who doesn't remember what it felt like before they were carrying it.</p>\n</div>\n\n<p>He helped Abby with her bag on the way out. Automatically. Without being asked. The kind of thing that's been done so many times it no longer requires a decision \u2014 it's just what hands do, what his hands do, what they've been doing for years in one form or another.</p>\n\n<p>She said something to him as they left, quiet, something that made him smile \u2014 the real one, not the one he offers by default, the one that changes the whole architecture of his face for just a second before it settles back into composed.</p>\n\n<p>I only saw it for a second.</p>\n\n<p>But I saw it.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 6 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Six</span>\n  <span class=\"sec-title\">What Owen Is</span>\n</div>\n\n<p>He is not the musician in the way that word usually gets used \u2014 the romantic archetype, the one with the tragic depths and the meaningful songs about feelings. He has those things, but they're incidental. They're not the architecture. They're what happens in the margins after everything essential is handled.</p>\n\n<p>He is not loud. He does not take up space the way people who want things for themselves take up space. He is not rebellious, not dramatic, not the older brother who resented the responsibility and made everyone know about it. He accepted it. That's both more admirable and more quietly heartbreaking than the alternative.</p>\n\n<p>What he is \u2014 what I can say with some confidence after watching him for one evening in a convenience store and filing away everything I saw \u2014 is <em>consistent.</em></p>\n\n<p>He is the person who shows up. Who was there when the medal needed to be hung and no one was coming, so he came. Who turns his own pain into protection for someone else before anyone even knows there was pain. Who grabs the guitar case before he grabs himself, because the guitar is the one thing he has that belongs only to him and he is not going to let anything take that away.</p>\n\n<p>He still has things he wants. Dreams that exist somewhere under the schedule, the responsibilities, the years of being the person other people leaned on. You can feel them, if you watch long enough. The way he plays late at night. The way the band has a name that sounds like a reminder rather than a declaration. The way he's still there, still at it, still carrying both the weight and the guitar case and somehow, improbably, keeping them both from falling.</p>\n\n<div class=\"hugot\">\n  <p>The thing about Owen is that he didn't choose this. Nobody asked him if he was ready to be the responsible one, the anchor, the person the whole family balanced on. He just looked around one day and saw what was needed and became it. And the thing about people who become what's needed \u2014 the real ones, the ones who do it without making sure everyone sees the sacrifice \u2014 is that they are so good at it that the people around them never fully understand what it costs. Because the whole point of being that kind of person is that no one ever has to know.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>He is Abby's structure. He is the reason she gets to be soft. The reason she can afford to wait for buses and love fully and call out to people who might need something \u2014 because all her life, there has been someone behind her making sure the floor is solid. She probably knows this, somewhere. But the way you know the floor is solid is that you never have to think about it. That's how good he is at it. That's the whole thing.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<!-- SECTION 7 -->\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Seven</span>\n  <span class=\"sec-title\">Before He Walked Through the Door</span>\n</div>\n\n<p>I learned this part later \u2014 from Abby, who heard it from Carlo, who had watched the whole thing from the convenience store window with the specific alertness of someone who sees most things from behind a counter. By the time it reached me it had passed through two people and still landed exactly right. That's how Owen stories are. The details hold.</p>\n\n<p>He was at the corner near the store \u2014 Cassiopea on his back, bag on his shoulder, rain doing its full committed thing \u2014 when a motorbike came around the turn at a speed that was not consulting the weather conditions. Denim jacket. Helmet with a sticker that said <em>CHAOTIC ENERGY.</em> The kind of energy that announces itself.</p>\n\n<p>He felt the hit through the strap on his back. He spun around. The rider had already stopped, already pulling off the helmet, already composing a face pre-loaded with annoyance before anyone had said anything.</p>\n\n<div class=\"dl\">\"Hey\u2014\"</div>\n<div class=\"dl\">\"Hey \u2014 what? You came out of nowhere.\"</div>\n<div class=\"dl\">\"I was on the sidewalk.\"</div>\n<div class=\"dl\">\"I had my signal on.\"</div>\n<div class=\"dl\">\"Your signal doesn't help my guitar.\"</div>\n<div class=\"dl\">\"It's a case. It's fine.\"</div>\n\n<p>Owen swung the guitar off his back. Opened the case right there on the wet sidewalk \u2014 with the specific efficiency of someone who had been doing this in all weather conditions for years \u2014 and turned it toward the light. There it was. A scratch along the lower bout. Not deep. But there.</p>\n\n<div class=\"dl\">\"Cassiopea.\"</div>\n\n<p>He said it quietly. Like a name you say in a specific tone when someone you care about has been hurt and you need to confirm it out loud before you can process the extent of the damage.</p>\n\n<div class=\"dl\">\"What?\"</div>\n<div class=\"dl\">\"Her name. Cassiopea.\"</div>\n<div class=\"dl\">\"You named your guitar.\"</div>\n<div class=\"dl\">\"Yes.\"</div>\n<div class=\"dl\">\"Like \u2014 it has a name. A full name. Cassiopea.\"</div>\n<div class=\"dl\">\"She's been with me through every gig. Every breakup. First time I played in front of a crowd, she was there. She has a name.\"</div>\n<div class=\"dl\">\"She's wood.\"</div>\n<div class=\"dl\">\"She's not just wood.\"</div>\n\n<p>The rider looked at him \u2014 still holding her helmet, rain on her jacket \u2014 with the face of someone who had arrived at this conversation expecting a standard traffic argument and had instead received a man defending the emotional life of his instrument on a wet sidewalk at 8:47 PM.</p>\n\n<div class=\"dl\">\"You know what, if you're this dedicated to a guitar, that guitar should have a ring by now.\"</div>\n<div class=\"dl\">\"Rings are for people who need to announce commitment. We're past that.\"</div>\n<div class=\"dl\">\"That is \u2014 genuinely the most unhinged thing I have heard this week. And I drove through that intersection at speed in the rain.\"</div>\n<div class=\"dl\">\"Which you probably shouldn't do.\"</div>\n<div class=\"dl\">\"I had a signal!\"</div>\n<div class=\"dl\">\"The signal doesn't matter as much as you think it matters in the rain.\"</div>\n\n<p>She opened her mouth. Closed it. There was a beat where the rain filled the silence and they were both just two wet people standing on a corner \u2014 him holding Cassiopea, her holding a helmet with CHAOTIC ENERGY on it.</p>\n\n<div class=\"dl\">\"Okay. Fine. I'm sorry about the guitar.\"</div>\n<div class=\"dl\">\"She'll survive.\"</div>\n<div class=\"dl\">\"Cassiopea.\"</div>\n<div class=\"dl\">\"Cassiopea.\"</div>\n\n<p>She did the thing with her mouth where it goes sideways slightly \u2014 not quite a smile, not quite a smirk, somewhere in between. The expression of a person who has decided you're ridiculous in an interesting way.</p>\n\n<div class=\"dl\">\"Good luck with your soulmate.\"</div>\n<div class=\"dl\">\"Good luck with your signal.\"</div>\n\n<p>She put the helmet back on. Visor down. Gone into the wet street.</p>\n\n<div class=\"memory\">\n  <p>Cassiopea \u2014 acoustic, light spruce top, koa back and sides. Purchased second-hand when Owen was nineteen. Been to seventeen gigs, six cities, four breakups (his and other people's), one very important contest where the host got the band name wrong and Owen held it up as a signal and played the best set of his life anyway. One new scratch, lower bout, acquired corner of Gen. Santos Ave., 8:47 PM, raining. Not deep enough to affect sound. Deep enough to matter.</p>\n</div>\n\n<p>I keep thinking about that corner. Not as a cute meet-cute detail \u2014 as evidence of something. Owen does not name things casually. He named that guitar the way he commits to things: quietly, without announcing it, with his whole chest. The guitar had been with him through everything \u2014 the gigs, the breakups, the band that continued even when the responsibility arrived and tried to take the music with it. He had set down a lot of things. Cassiopea he had kept.</p>\n\n<p>You don't notice what you've kept until something bumps into it. Until a motorbike comes around a corner in the rain and the thing on your back takes the hit and you say the name out loud before you even decide to. And in the saying of it, something shifts \u2014 the thing is real, you've been carrying it all along, and maybe that scratch doesn't make it less worth keeping.</p>\n\n<p>Maybe it makes it more.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<p>He walked in from the rain that night with a guitar on his back and a scratch that would bother him more than he'd let on. He made the joke, dried off, checked Cassiopea one more time before he set her down. He let Keith talk at him and made room for it. He looked at me once, said hey, and that was enough.</p>\n\n<p>He walked out the same way \u2014 door, bell, gone \u2014 with Abby beside him and the case in his hand and the rain still doing its thing outside.</p>\n\n<p>Already figuring out what comes next.</p>\n\n<p>That's the whole portrait, as best as I can give it. The boy who grew up first. The kuya who never made it a thing. The one who kept the guitar through everything and said her name like it mattered \u2014 because it did, because he is someone for whom the things that matter <em>matter,</em> quietly and completely and without apology.</p>\n\n<p>Still carrying it all. Still showing up. Still, somehow, finding three chords at the end of the night and meaning every one of them.</p>\n\n<p class=\"line\">Not broken.</p>\n<p class=\"line\">Not finished.</p>\n<p class=\"line\"><em>Still trying.</em></p>\n\n<!-- REACTIONS -->\n<div class=\"rxns\">\n  <span class=\"rx\">&#127928; the guitar case detail destroyed me</span>\n  <span class=\"rx\">&#128155; fake mustache. i'm crying.</span>\n  <span class=\"rx\">&#128557; steel strain lmaooo</span>\n  <span class=\"rx\">&#129293; \"still here. still at it.\"</span>\n  <span class=\"rx\">\u2728 dean sees him so clearly</span>\n  <span class=\"rx\">&#128557; the graduation memory</span>\n  <span class=\"rx\">\u2614 the floor being solid</span>\n  <span class=\"rx\">&#127925; kaya namin. always kaya namin.</span>\n</div>\n\n<!-- END CARD -->\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#127928;</span>\n  <p class=\"end-title\">\u2014 end of owen's introduction \u2014</p>\n  <p class=\"end-meta\">\n    for the ones who learned that bago mo habulin<br>\n    ang sarili mong pangarap, kailangan munang<br>\n    okay ang mga mahal mo sa buhay.<br><br>\n    we see you. we're rooting for you. &#129293;<br><br>\n    <em>next: Chapter 1 \u2013 \"Still Trying\" \u00b7 Owen</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; 3.1K</span>\n</div>"
