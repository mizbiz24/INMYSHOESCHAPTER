<script>
const stories = {
  dean: "\n\n\n<div class=\"cold-open\" style=\"animation-delay:0.35s\">\n  <span class=\"cold-open-tag\">dean reyes &nbsp;\u00b7&nbsp; narrator &nbsp;\u00b7&nbsp; caramel night</span>\n  <p>This is the chapter I am most hesitant to write. Not because it is complicated \u2014 it is the simplest thing that happened tonight. Simple and clean and devastating in the specific way of things that were always going to happen, that had been built toward for a long time, that arrived exactly when they were supposed to.</p>\n  <p>Keith got the girl. I wrote him the words to do it. He read them on a stage in front of a crowd while I stood in the dark at the edge of the lamplight and heard my own feelings come out in his voice, for someone who was not me.</p>\n  <p>That's the whole story. Everything else is just the texture of it.</p>\n</div>\n\n<div class=\"sec-head\" style=\"animation-delay:0.4s\">\n  <span class=\"sec-num\">One</span>\n  <span class=\"sec-title\">Before It Happened</span>\n</div>\n\n<span class=\"scene-label\">Riverside Carnival \u00b7 Saturday \u00b7 7:30 PM</span>\n\n<p class=\"opener\">Let me tell you about the carnival before I tell you about what happened at the carnival. Because there is a version of this night that is just lights and music and the usual pleasant chaos of a hundred people in a warm space in November \u2014 and I want you to have that version briefly, the one where nothing has happened yet, before I tell you what happened.</p>\n\n<p>The org had set up a small open mic near the main stage \u2014 six chairs, a mic stand, a single lamp that turned everything amber. People had been taking turns all evening. Bad jokes, two acoustic covers, someone reading a poem they'd clearly written that afternoon. The usual range of courage and its consequences.</p>\n\n<p>Keith had told me, two days ago, that he was going to do something at the open mic. He had not told me what. He had said it the way he said things when he was nervous \u2014 quickly, without details, moving on before I could ask follow-up questions. I had noted it the way I noted most things about Keith: carefully, without comment, stored in the specific inventory I had been keeping for years.</p>\n\n<p>I watched the carnival from slightly outside it, the way I usually watched things \u2014 present but at a half-step of remove, close enough to see clearly, far enough to not be required to participate at full volume. I saw Lauren across the crowd, the yellow dress, the specific energy of someone building toward a thing. I saw Abby near the food stalls, more quiet than usual, carrying something. I saw Carlo in the mascot costume near the children's section \u2014 I almost didn't recognize him. I almost didn't look twice.</p>\n\n<p>I was near the open mic at nine when Keith got up.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Two</span>\n  <span class=\"sec-title\">The Open Mic</span>\n</div>\n\n<span class=\"scene-label\">Open Mic Stage \u00b7 9:15 PM</span>\n\n<p>He looked nervous. That was the first thing \u2014 Keith, who moved through most situations with the ease of someone who had never needed to calculate his own presence, looked nervous. Not collapsing-nervous. The real kind. The kind that meant something mattered.</p>\n\n<p>He adjusted the mic. Looked out at the small crowd that had gathered. Ari was in the front row \u2014 I saw her before I saw him, actually. Her face already doing the thing it did around Keith \u2014 the warmth, the full attention, the specific brightness of someone who had not been surprised by this but was choosing to feel it anyway.</p>\n\n<p>Keith unfolded a piece of paper.</p>\n\n<p>I went very still.</p>\n\n<p>It was not the letter I had written. He had done what I told him to do \u2014 he had written his own version. It was shorter, rougher around the edges, with his voice in it rather than mine. But he had started with one of the lines from the rooftop. One of the lines I had written and given him and told him to use as a starting point and then told him to throw away.</p>\n\n<p>He had kept it.</p>\n\n<div class=\"letter-heard\" style=\"animation-delay:0.1s\">\n  <div class=\"letter-line\">\"I don't look for you in every room. But I always find you.\"</div>\n  <div class=\"letter-line\">\"That's what important feels like when it's real \u2014 not a search. Just: you're already there.\"</div>\n</div>\n\n<p>My own words. In his voice. For her.</p>\n\n<p>The crowd made the sound crowds make when something genuine has happened in a public space \u2014 not applause, not yet, just the collective exhale of a group of people who have recognized something real. I heard it from wherever I was standing, at the edge of the lamp's reach, outside the amber circle.</p>\n\n<p>Keith kept reading. His own words now \u2014 the rougher ones, the ones that sounded like him, that had the specific warmth and directness of someone who had decided to just say the true thing and let it be what it was. He was not a careful writer. He was an honest one. I had always known that about him. That was the thing, maybe, that I had been writing toward \u2014 trying to give him the version of honesty he didn't have the vocabulary for yet. Except the vocabulary had been mine. And the feeling had been mine. And the words had been mine.</p>\n\n<p>He looked up from the paper when he was done. He looked at Ari.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker keith\">Keith</span>\n  <div class=\"dl-text keith\">\"Ari. Can I be your boyfriend.\"</div>\n</div>\n\n<p>She laughed. The real one, the uncontrolled kind. Then she said yes \u2014 or something that meant yes, something that was mostly movement, mostly her standing up and the crowd cheering and Keith's whole face doing the thing it did when things went the way he had believed they would, the specific vindication of someone who had trusted their instinct and been right.</p>\n\n<p>He hugged her. Both arms. The complete version.</p>\n\n<p>And then \u2014 over her shoulder, still holding on, the way you look at something from a distance when you've just realized something and you need to check if the person you're thinking of knows it too \u2014 he looked at me.</p>\n\n<div class=\"the-look\" style=\"animation-delay:0.1s\">\n  <span class=\"the-look-label\">the look \u00b7 9:22 PM \u00b7 three seconds</span>\n  <p>Not a confession. Not an apology. Not an explanation.<br><br>\n  Just: eyes finding eyes across a carnival crowd, across an amber lamp, across the specific distance of two people who have been close for a long time and are only now understanding the shape of what that closeness has been.<br><br>\n  He looked at me the way you look at someone when you have just understood something you can't unknow and you don't have the words for it yet and the words wouldn't help anyway.<br><br>\n  I looked back.<br><br>\n  Three seconds.<br><br>\n  Then Ari said something and he turned back to her and the moment was over.<br><br>\n  That was all. That was everything.</p>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Three</span>\n  <span class=\"sec-title\">After</span>\n</div>\n\n<span class=\"scene-label\">Edge of the Carnival \u00b7 9:30 PM</span>\n\n<p>I left before the cheering stopped. Not dramatically \u2014 just the quiet exit of someone who has seen the thing they came to see and needs somewhere private to be now. I walked through the crowd, through the lights, through the music, and I found the edge of the carnival where it met the park, where the sound reduced to something manageable, where the rain was just starting to come down.</p>\n\n<div class=\"hugot\">\n  <p>The most painful thing about tonight is not that he chose Ari. Keith choosing Ari is the right thing. Ari is good. Keith is happy. The letter landed the way it was supposed to land and the thing it was supposed to start is started and everyone got what they should have gotten.<br><br>\n  The most painful thing is the three seconds.<br><br>\n  Because in three seconds he understood something. Maybe not all of it. Maybe just the edge of it \u2014 just enough to know that the words came from somewhere real, that the sincerity in the letter was not borrowed, that when he said <em>if someone wrote me that I'd cry</em> he was right about that and wrong about who had written it for.<br><br>\n  He understood. And then he turned back to Ari.<br><br>\n  And that was the only possible ending and it was still the worst one.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>I stood in the rain at the edge of the park and let myself feel it without managing it. Without the narration. Without the careful description of the feeling from a slight distance. Just the feeling itself \u2014 the raw version, the one I had been circling for years without letting myself land in it.</p>\n\n<p>This is what it was. This specific quality of loss \u2014 not the loss of a thing you had, but the loss of the possibility of a thing. The door closing on the room you were never in, that you had been standing outside of for so long that the standing had started to feel like the whole story.</p>\n\n<p>I had written the most honest thing I'd ever written. Keith had read it to someone else. The crowd had cheered. The rain was coming down.</p>\n\n<p>Nobody had noticed me leave.</p>\n\n<div class=\"silent\" style=\"animation-delay:0.1s\">\n  <p>There are love stories that are only ever meant to be written. Not lived. Not spoken. Not received by the person they were written for. Just \u2014 written. Just: existing in the space between the feeling and the page, true and complete and going nowhere.<br><br>\n  Maybe that's enough.<br><br>\n  I don't know yet if I believe that.<br><br>\n  But it's what I have tonight.</p>\n</div>\n\n<p class=\"line\">I stood in the rain.</p>\n<p class=\"line\">The carnival lights refracted off the wet ground behind me.</p>\n<p class=\"line\">Somewhere in there, Keith was happy.</p>\n<p class=\"line\">Ari was happy.</p>\n<p class=\"line\">That was real. That mattered. I wasn't going to take that away by making it about me.</p>\n<p class=\"line\"><em>But standing in the rain, alone, with my own words still in my ears \u2014</em></p>\n<p class=\"line\"><em>in his voice, for her \u2014</em></p>\n<p class=\"line\"><em>I let myself grieve it.</em></p>\n<p class=\"line\"><em>Just once.</em></p>\n<p class=\"line\"><em>Just tonight.</em></p>\n\n<div class=\"rxns\">\n  <span class=\"rx\">&#128156; \"I don't look for you in every room\"</span>\n  <span class=\"rx\">&#128148; the three seconds</span>\n  <span class=\"rx\">&#128557; \"those were my words\"</span>\n  <span class=\"rx\">\u2728 nobody noticed him leave</span>\n  <span class=\"rx\">&#128257; love stories only meant to be written</span>\n  <span class=\"rx\">&#129293; just tonight</span>\n</div>\n\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#128156;</span>\n  <p class=\"end-title\">\u2014 end of dean's chapter eight \u2014</p>\n  <p class=\"end-meta\">\n    for the ones whose most honest writing<br>\n    was addressed to someone who didn't know. &#129293;<br><br>\n    <em>next: Chapter 8 \u2013 \"You Used Me to Forget\" \u00b7 Owen</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; &#128156;</span>\n</div>\n\n</div>\n\n</body>\n</html>",
  abby: "\n\n\n<div class=\"cold-open\" style=\"animation-delay:0.35s\">\n  <span class=\"cold-open-tag\">dean reyes &nbsp;\u00b7&nbsp; narrator &nbsp;\u00b7&nbsp; caramel night</span>\n  <p>Let me tell you what I know about Abby, before I tell you what happened to her tonight.</p>\n  <p>Abby has been the most accurate person I know for as long as I've known her. She sees things clearly \u2014 the shape of situations, the distance between what people say and what they mean, the slow erosion of something that used to be solid. She has been mapping it in her thesis for three semesters. She has been living inside the map for eleven months.</p>\n  <p>The cruel irony of Abby is that she could diagnose everyone else's situation with perfect clarity and still be standing inside her own, unable to apply the diagnosis. She knew what Vince was doing to her. She had known for a long time. She had just been waiting for the right moment to do something about it.</p>\n  <p>Tonight the moment arrived. The way moments like that usually do \u2014 not when you're ready. When the city decides for you.</p>\n</div>\n\n<div class=\"sec-head\" style=\"animation-delay:0.4s\">\n  <span class=\"sec-num\">One</span>\n  <span class=\"sec-title\">He Was Never Abroad</span>\n</div>\n\n<span class=\"scene-label\">Her Apartment \u2192 Carnival \u00b7 Saturday \u00b7 7:45 PM</span>\n\n<p class=\"opener\">She almost didn't go. That's the part I pieced together later, from what she told me, from the specific quality of the night she had before the carnival \u2014 the apartment, the thesis open on the laptop, the deliberate stillness of someone who has decided to stay in and is performing being fine about it.</p>\n\n<p>She was scrolling through her phone at around seven when she saw it. Someone's story \u2014 a girl from a mutual org, someone she didn't know well enough to have saved, just a name she recognized. A video, seven seconds long. The carnival. The lights. A crowd. And in the left edge of the frame, half-visible, gone before the video ended \u2014 a figure. A particular way of standing. A particular angle of a shoulder.</p>\n\n<p>She replayed it three times.</p>\n\n<p>She told me: <em>I know the shape of him. That's the thing. You spend enough time watching someone and you learn the shape of them \u2014 the specific way they carry themselves, the tilt of the head when they're relaxed, the way they stand when they think nobody is looking. I know his shape. I have known it for eleven months. And that was his shape in the video.</em></p>\n\n<p>She sat with her phone for twenty minutes. She opened the thesis. She closed the thesis. She told herself: you're reading into it. You're doing the thing again \u2014 finding evidence for the conclusion you already want to reach, which is the exact thing you've been trying not to do for eleven months. You don't even know if he's back. You don't know anything. The shape of someone in a seven-second video is not proof. You could be wrong.</p>\n\n<p>She was very aware that she could be wrong.</p>\n\n<p>She got dressed anyway.</p>\n\n<div class=\"moment-card\" style=\"animation-delay:0.1s\">\n  <span class=\"moment-label\">the seven-second video \u00b7 what she saw \u00b7 what she told herself</span>\n  <div class=\"moment-line\">The figure at the left edge of the frame. Gone in under two seconds.</div>\n  <div class=\"moment-line\">The shoulder angle. The way he stood when he wasn't performing for anyone.</div>\n  <div class=\"moment-line\">She told herself: this could be anyone. This is a crowded carnival. You are looking for him because part of you has been looking for him for months.</div>\n  <div class=\"moment-line\">She told herself: but I know his shape. I have been watching him long enough to know his shape. And that was his shape.</div>\n  <div class=\"moment-line\">She got dressed anyway. She did not tell anyone she was going.</div>\n</div>\n\n<p>She came alone. That's important \u2014 she didn't call me, didn't text anyone. This was not a group decision. This was Abby, by herself, in her thesis-research brain, following a lead she wasn't fully willing to call a lead, going to a carnival she hadn't planned to attend, to verify something she wasn't sure she was ready to verify.</p>\n\n<p>I didn't know she was there until I saw her in the rain.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Two</span>\n  <span class=\"sec-title\">She Was Right</span>\n</div>\n\n<span class=\"scene-label\">Carnival \u00b7 8:30 PM</span>\n\n<p>She moved through the carnival the way she moved through most things she was uncertain about \u2014 carefully, at an angle, giving herself multiple exits. She told me she kept stopping herself. <em>I'll do one pass through the main area and if I don't see him I'll go home.</em> Then: <em>one more section. Just to be sure.</em> The specific bargaining of someone who already knows the answer and is giving themselves permission to find it in the least damaging way possible.</p>\n\n<p>She found him near the food stalls at eight-thirty.</p>\n\n<p>Not from a distance, not a glimpse \u2014 properly. Full view. Him. Vince. In the same city she was in. At a carnival thirty minutes from her apartment. Laughing at something the girl beside him had just said, leaning close, entirely present in the moment he was in.</p>\n\n<p>She stood very still.</p>\n\n<p>The carnival kept going around her. All of it at full volume \u2014 the music, the lights, the children \u2014 while she stood there and felt the floor of something rearrange itself underneath her. Not dramatically. Just: the architecture of the last eleven months shifting to accommodate the new information. The calls that ended early. The messages at strange hours. The distance she had been making excuses for.</p>\n\n<p>He had never been that far.</p>\n\n<div class=\"dean-narrate\">\n  <p>She told me she stood there for about two minutes before she moved. Not frozen \u2014 she said it didn't feel like freezing, it felt like finishing a calculation. All the data she had been collecting for months, arranged into its correct shape at last. The thesis sentence arriving in real life: longing is the distance between what someone says and what they consistently choose. She had written that about longing in art. She had been living it in her own apartment for almost a year. And here was the proof of it, eating street food at a carnival thirty minutes from her door.</p>\n  <p>She walked toward him.</p>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Three</span>\n  <span class=\"sec-title\">The Confrontation</span>\n</div>\n\n<span class=\"scene-label\">Near the Food Stalls \u00b7 8:47 PM</span>\n\n<p>She didn't plan what to say. Eleven months of planning \u2014 editing, adjusting, finding the version that asked less and gave more, the version that wouldn't make him feel crowded \u2014 and the one time it mattered she just walked forward without a script. She told me that felt right. That the planning had always been protection, and she was done protecting him from her honesty.</p>\n\n<p>He saw her when she was six feet away. Recognition, then something that might have been warmth, then immediately the expression of someone whose careful management of a situation has stopped working. She said she watched the sequence happen on his face in about three seconds and felt, for the first time in months, completely clear about what she was looking at.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"When did you get back.\"</div>\n</div>\n\n<p>Not accusation. A question. Her voice was level \u2014 she hadn't expected that. She had expected anger. She was past the anger already, into the place past it, which was colder and cleaner and much harder to navigate around.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker vince\">Vince</span>\n  <div class=\"dl-text vince\">\"Abby\u2014\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"When did you get back.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker vince\">Vince</span>\n  <div class=\"dl-text vince\">\"Can we not do this here.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"How long have you been here, Vince.\"</div>\n</div>\n\n<p>A few weeks, he said. Was going to tell her. The girl beside him stepped back \u2014 the specific distance of someone who had just understood they were in a scene they didn't sign up for. Then came the recalibrating look. She recognized it. The look he used when he was deciding how to make a situation about something adjacent to the actual thing.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker vince\">Vince</span>\n  <div class=\"dl-text vince\">\"It's complicated. You always make everything so\u2014\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"I make everything so what.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker vince\">Vince</span>\n  <div class=\"dl-text vince\">\"Heavy. You make it heavy. I can't breathe when you\u2014\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"You lied to me about where you were.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker vince\">Vince</span>\n  <div class=\"dl-text vince\">\"I just needed space. You don't give me space\u2014\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"I deleted every real thing I wanted to say to you for eleven months so you wouldn't feel crowded. I apologized for things that weren't my fault. I told myself the problem was the distance, the timing, your schedule \u2014 I made every excuse available because the alternative was admitting you weren't actually trying.\"</div>\n</div>\n\n<p>He opened his mouth. She kept going \u2014 not loudly, not performing, just the specific momentum of someone who has been holding something too long and has finally found the room for it.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"I changed myself around you. Not because you asked me to. Because I convinced myself that if I could just make myself small enough, quiet enough, easy enough \u2014 then you'd stay. And I thought that was love. I thought that was what you did for people you loved.\"</div>\n</div>\n\n<p>He told her she was being dramatic. Said it in the gentle, patient tone she had been trained on for eleven months \u2014 the tone that had been teaching her, gradually, that her feelings were calibrated wrong and she just needed the right perspective to see it correctly.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker vince\">Vince</span>\n  <div class=\"dl-text vince\">\"You're doing it again. Everything is always so dramatic with you\u2014\"</div>\n</div>\n\n<p>And then the girl beside him. Not cruel at all \u2014 she told me that specifically. Just young, seeing thirty seconds of a scene, drawing the obvious surface conclusion.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker sister\">Girl</span>\n  <div class=\"dl-text sister\">\"She's kind of being a lot right now, no?\"</div>\n</div>\n\n<div class=\"hugot\">\n  <p>This is what it does over long enough. It doesn't just change what you believe about a specific situation. It changes the story. The story becomes something other people can read from the outside \u2014 the easy, wrong version \u2014 and you can't correct it because correcting it sounds exactly like what the story said you'd do.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<p>Abby looked at the girl. Then she looked at Vince. And something that had been building for eleven months arrived in her face as something simple. Clear. Done.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"I spent almost a year convinced I was the problem. I believed you. I believed it more than I believed myself, more than I believed the people who loved me, more than I believed the evidence that was right in front of me every single day.\"</div>\n</div>\n\n<p>She breathed.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker abby\">Abby</span>\n  <div class=\"dl-text abby\">\"I wasn't the problem. You were just someone who needed me to believe I was.\"</div>\n</div>\n\n<p>She turned around. The rain had started \u2014 real rain now, steady, the kind that soaked through things quickly. She walked into it and didn't look back and didn't manage any of it.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Four</span>\n  <span class=\"sec-title\">The Rain</span>\n</div>\n\n<span class=\"scene-label\">Edge of the Carnival \u00b7 9:10 PM</span>\n\n<p>She was crying before she reached the edge of the carnival. She told me this part herself, later \u2014 not that night, but after. She said it wasn't the breakdown kind of crying. Just: the release of something that had been compressed for a very long time. She walked and let the rain do what rain did and she didn't try to manage any of it, for the first time in eleven months.</p>\n\n<p>She was right about everything. About Vince, about the pattern, about what it had been doing to her. The thesis had been right. Lauren had been right in the classroom. The voice note had been right. Being right had not protected her from any of it.</p>\n\n<p>That was the thing nobody told you. That you could have perfect analysis and still be standing inside it. That being the most observant person in the room about everyone else's life was not the same as being safe inside your own.</p>\n\n<div class=\"silent\" style=\"animation-delay:0.1s\">\n  <p>She came to the carnival alone. She left it alone too \u2014 into the rain, without telling anyone where she was going, without calling anyone.<br><br>\n  She had come to verify something. She had verified it.<br><br>\n  She was still in the process of figuring out what you did next, after the verification. How you moved from the knowing into the after. How long that took.<br><br>\n  She didn't have the answer yet. She was just walking.</p>\n</div>\n\n<p>She found Owen somewhere near the outer path. Or Owen found her. She told me she heard him before she saw him \u2014 something about the way he was standing in the rain, the specific stillness of it, that made her slow down. He looked up. She looked at him. Two people at the end of two different things that had, underneath, the same exact shape.</p>\n\n<p>Neither of them said anything. She walked to him. He held on.</p>\n\n<p>That was it. That was the whole thing. No words \u2014 the words would come later, in pieces, over the next few days. But that night: just two people in the rain outside a carnival, holding on to each other while the lights went softer behind them and the city kept going around them the way cities always do, indifferent and warm at once.</p>\n\n<div class=\"dean-narrate\">\n  <p>I found out she had been there at all from Owen, the next day. He mentioned it in passing \u2014 <em>Abby and I ran into each other in the rain</em> \u2014 and I said: <em>she was there?</em> And he said: yeah. And something in the way he said it told me it had been important, the way the things that happen without planning are sometimes the most important ones.</p>\n  <p>She called me two days later. She told me about the story on someone's phone, the seven-second video, the shape she recognized. She said: <em>I knew it was him before I even knew I knew. I just needed to go see for myself.</em></p>\n  <p>I said: I know.</p>\n  <p>She said: <em>I came alone. I don't know why I didn't call you.</em></p>\n  <p>I said: Because some things you have to do alone first. And then you don't have to be alone anymore.</p>\n  <p>She was quiet for a moment.</p>\n  <p>Then she said: <em>yeah. yeah, I think that's right.</em></p>\n</div>\n\n<p class=\"line\">She came to the carnival alone.</p>\n<p class=\"line\">She left it in the rain with Owen.</p>\n<p class=\"line\">She was right about everything.</p>\n<p class=\"line\">She lost anyway.</p>\n<p class=\"line\"><em>But standing in the rain with someone who understood \u2014</em></p>\n<p class=\"line\"><em>not fixed, not better, just: known \u2014</em></p>\n<p class=\"line\"><em>that was enough for that night.</em></p>\n<p class=\"line\"><em>Sometimes enough is exactly enough.</em></p>\n\n<div class=\"rxns\">\n  <span class=\"rx\">&#129653; \"he was never abroad\"</span>\n  <span class=\"rx\">&#128148; \"she's kind of being a lot\"</span>\n  <span class=\"rx\">&#128557; \"I wasn't the problem\"</span>\n  <span class=\"rx\">\u2728 abby and owen in the rain</span>\n  <span class=\"rx\">&#128257; right about everything. still lost.</span>\n  <span class=\"rx\">&#129293; not alone</span>\n</div>\n\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#129653;</span>\n  <p class=\"end-title\">\u2014 end of abby's chapter eight \u2014</p>\n  <p class=\"end-meta\">\n    for the ones who were right the whole time<br>\n    and got hurt anyway. &#129293;<br><br>\n    <em>next: Chapter 8 \u2013 \"Those Were My Words\" \u00b7 Dean</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; &#129653;</span>\n</div>\n\n</div>\n\n</body>\n</html>",
  lauren: "\n\n<div class=\"cold-open\" style=\"animation-delay:0.35s\">\n  <span class=\"cold-open-tag\">dean reyes &nbsp;\u00b7&nbsp; narrator &nbsp;\u00b7&nbsp; caramel night</span>\n  <p>Caramel is only sweet at the beginning.</p>\n  <p>That's the thing about it \u2014 the process looks beautiful from the outside. Sugar dissolving into amber, the color shifting, the slow transformation of something ordinary into something that catches light. You watch it and you think: something good is happening here. Something is becoming.</p>\n  <p>What you don't see, until it's too late, is that the same heat that makes the caramel also burns it. That there is no warning between golden and destroyed. That the window is smaller than you think and the fire doesn't wait for you to be ready.</p>\n  <p>I've been thinking about that a lot tonight. About all of us \u2014 and the specific way we each found ourselves standing too long in our own particular heat. Telling ourselves: this is warmth. This is becoming. This is the process working the way it's supposed to work.</p>\n  <p>Until the night of the carnival. Until everything burned at once.</p>\n  <p>Let me tell you about Lauren first. Because Lauren arrived at that carnival believing, with everything she had, that this was finally the night the thing became real. And watching her believe it \u2014 from across the crowd, from my half-step outside of everything \u2014 was the most beautiful and most terrible thing I saw all evening.</p>\n  <p>Before the terrible part. The beautiful part first.</p>\n</div>\n\n<div class=\"sec-head\" style=\"animation-delay:0.4s\">\n  <span class=\"sec-num\">One</span>\n  <span class=\"sec-title\">The Yellow Dress</span>\n</div>\n\n<span class=\"scene-label\">Lauren's Apartment \u00b7 Saturday \u00b7 5:00 PM</span>\n\n<p class=\"opener\">She had been getting ready since five. Not because it took that long \u2014 Lauren could be ready in twenty minutes when she needed to be. She was getting ready since five because the getting-ready was part of it. The ritual of a night she had been building toward.</p>\n\n<p>The yellow dress had been in her closet for three weeks. She had bought it without a stated plan \u2014 or that was what she told herself. The truth was that she had seen it in a shop window and thought: there is a night this dress is for. She had bought it and hung it and known, in the specific quiet way Lauren knew things she wouldn't say out loud, what night that was.</p>\n\n<p>She tried it on at five-fifteen. Turned in the mirror. The dress was right \u2014 warm, bright, the kind of thing that made you look like you had arrived from somewhere slightly better than everywhere else, like the evening was yours already.</p>\n\n<p>She thought about Rein. The mall. The forty-fourth replay she had stopped before it finished. The week of trying to fit into his group, the half-beat laugh, the way she had been adjusting herself around spaces that used to adjust around her.</p>\n\n<p>She told herself: tonight is different. Tonight I'm just \u2014 present. Warm. Myself.</p>\n\n<p>She believed it completely. That was one of Lauren's most extraordinary qualities: the pre-commitment to joy. The decision to feel things fully before she had any evidence they would be returned. It was also what made tonight possible.</p>\n\n<div class=\"dean-narrate\">\n  <p>I saw her arrive. The yellow dress. The way she moved through the entrance with her head up, genuinely happy to be there before anything had happened. That's the part I keep coming back to. The happiness was real. The hope was real. It wasn't delusion. It wasn't stupidity. It was Lauren being exactly who she was \u2014 the person who walked into rooms and decided, in advance, that they were going to be good.</p>\n  <p>I always thought that was her most remarkable quality. Tonight I watched it become the most painful one.</p>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Two</span>\n  <span class=\"sec-title\">The Group She Was Never Fully In</span>\n</div>\n\n<span class=\"scene-label\">Carnival \u00b7 Main Area \u00b7 7:15 PM</span>\n\n<p>She found Rein's group at the ring toss. Not because she had asked where they would be \u2014 because she had been paying close enough attention over the past weeks to know their geography. Which booths, which section, which cluster of people they migrated toward over the course of an evening. She had been learning the map of their world with the quiet, thorough attention of someone who needed to belong to it.</p>\n\n<p>Rein saw her and smiled. The easy, uncomplicated smile \u2014 the one that cost him nothing to give and meant everything to receive. He touched her shoulder. Said she looked great. He meant it. She knew he meant it. She had learned, over many months, to live in the parts that were real and not ask too many questions about the gaps between them.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker rein\">Rein</span>\n  <div class=\"dl-text rein\">\"You made it.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"I told you I would.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker rein\">Rein</span>\n  <div class=\"dl-text rein\">\"You know Marcus and Gia already, right?\"</div>\n</div>\n\n<p>She did. She had been introduced to them twice before. The second time they had looked at her with the polite blankness of people being introduced to someone for the first time, and she had understood then \u2014 with the specific, quick intelligence that was one of her best qualities and also one of her most inconvenient ones \u2014 that she had not registered. That she existed in their peripheral vision but not in their awareness.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker marcus\">Marcus</span>\n  <div class=\"dl-text marcus\">\"Oh hey. Rein's friend, right?\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"Lauren. We've met a couple times.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker marcus\">Marcus</span>\n  <div class=\"dl-text marcus\">\"Oh yeah, yeah. You org people?\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"VP for events.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker marcus\">Marcus</span>\n  <div class=\"dl-text marcus\">\"Nice.\"</div>\n</div>\n\n<p>And then he looked away. Not rudely \u2014 just the way you look away from something that has been acknowledged and is no longer the most interesting thing available. Lauren held her smile at the correct temperature and followed the group into the evening.</p>\n\n<div class=\"detail-log\" style=\"animation-delay:0.1s\">\n  <span class=\"detail-label\">two hours &nbsp;\u00b7&nbsp; what she noticed &nbsp;\u00b7&nbsp; what she adjusted</span>\n  <div class=\"detail-row\">7:30 \u2014 someone made a joke she didn't have the context for. She laughed anyway. Half a beat late.</div>\n  <div class=\"detail-row\">7:45 \u2014 Gia mentioned a bar Lauren didn't know. She nodded like she did.</div>\n  <div class=\"detail-row\">8:00 \u2014 Rein's arm around her shoulder, briefly, in passing. She held still so he wouldn't move it. He moved it anyway.</div>\n  <div class=\"detail-row\">8:15 \u2014 someone spoke directly to her. She answered well. They looked surprised she had opinions.</div>\n  <div class=\"detail-row\">8:30 \u2014 Rein laughed at something. Didn't look at her while he laughed. She noticed. She told herself it was fine.</div>\n  <div class=\"detail-row\">8:45 \u2014 she said something in a gap in the conversation. Nobody responded. Rein didn't rescue it. She pivoted before anyone noticed.</div>\n  <div class=\"detail-row\">9:00 \u2014 she was still here. Still smiling. Still performing the version of herself that belonged in this group. Still hoping it would stop being a performance if she did it long enough.</div>\n</div>\n\n<div class=\"dean-narrate\">\n  <p>I watched Lauren in Rein's group for about twenty minutes from across the carnival. The adjusted posture. The careful timing. The way she tracked Rein in the corner of her eye without turning her head \u2014 the peripheral surveillance of someone monitoring a signal they were afraid to look at directly.</p>\n  <p>She was so good at it. That was the part that undid me from the outside. She was so fluent in the performance that if you weren't watching closely, you would just see: a girl having a good time at a carnival. You would not see the distance between who she was in this group and who she was everywhere else. Between Lauren performing and Lauren living. Between something brilliant and something luminous. She had always been the second one. Tonight she was spending a perfectly good evening being the first.</p>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Three</span>\n  <span class=\"sec-title\">What She Heard in the Bathroom</span>\n</div>\n\n<span class=\"scene-label\">Carnival CR \u00b7 9:38 PM</span>\n\n<p>She went to the bathroom at nine-thirty-eight. Just a moment away from the noise \u2014 a room where nobody was watching, where she could let the management of her face down for a few minutes before going back out.</p>\n\n<p>She thought about texting Abby. Opened her phone. Saw Abby's name. Thought about everything between them since last week \u2014 the fight, the things said, the specific silence after. She put her phone away.</p>\n\n<p>Then the door opened. Two voices. She recognized them \u2014 Gia, and the other girl from the group, the one whose name Lauren had not caught and been too embarrassed to ask again.</p>\n\n<p>She stayed where she was.</p>\n\n<div class=\"cr-scene\" style=\"animation-delay:0.1s\">\n  <span class=\"cr-label\">overheard &nbsp;\u00b7&nbsp; CR &nbsp;\u00b7&nbsp; 9:39 PM</span>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker gia\">Gia</span>\n    <div class=\"dl-text gia\">\"Okay did you see the bet in the groupchat?\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker girl-a\">Other Girl</span>\n    <div class=\"dl-text girl-a\">\"The couples one? Yes.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker gia\">Gia</span>\n    <div class=\"dl-text gia\">\"I put two hundred on Side B.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker girl-a\">Other Girl</span>\n    <div class=\"dl-text girl-a\">\"Lauren falls first, Rein does nothing about it?\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker gia\">Gia</span>\n    <div class=\"dl-text gia\">\"Easy money.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker girl-a\">Other Girl</span>\n    <div class=\"dl-text girl-a\">\"That's kind of mean though. She seems nice.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker gia\">Gia</span>\n    <div class=\"dl-text gia\">\"She is nice. That's the whole problem. Rein doesn't do serious and she doesn't know that yet. She's out here wearing yellow for him since she arrived.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker girl-a\">Other Girl</span>\n    <div class=\"dl-text girl-a\" style=\"font-style:italic;opacity:0.4\">\u2014 a laugh, then a pause \u2014 then the specific quality of a silence that happens when someone has noticed something they shouldn't have \u2014</div>\n  </div>\n</div>\n\n<p>A bag zipped. The tap. The door opened. They left.</p>\n\n<p>Lauren stood in the stall.</p>\n\n<p>She was not crying yet \u2014 that came later. What she was doing was something harder than crying: she was understanding. Receiving information that had been sitting in the room for months \u2014 in every half-beat laugh, every unanswered sentence, every arm that moved when she held still \u2014 and letting it, finally, land.</p>\n\n<p><em>She's been wearing yellow for him since she got here.</em></p>\n\n<p>The dress. The specific dress she had bought three weeks ago in a shop window for a specific night. The intention she thought was private. It had been visible the whole time. Everyone had seen it. They had bet on it. Put money on the outcome she was trying not to think about. Decided, among themselves, that she was going to fall and he was not going to catch her, and the only question was the timing.</p>\n\n<p>She had been the group chat item. The easy money. Side B.</p>\n\n<div class=\"hugot\">\n  <p>The most humiliating thing is not when someone hurts you deliberately. It's when they discuss you casually. When they bet on you. When your most vulnerable feeling becomes a side A and a side B and someone puts money on the outcome you were trying not to think about.<br><br>\n  Because that means: they saw it coming. Everyone saw it coming. The only one who didn't know was you \u2014 standing there in yellow, hoping, being exactly as visible as you were trying not to be.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Four</span>\n  <span class=\"sec-title\">The Confrontation</span>\n</div>\n\n<span class=\"scene-label\">Near the Ferris Wheel \u00b7 10:05 PM</span>\n\n<p>She walked out of the CR and found Rein near the ferris wheel. His group nearby, smaller now \u2014 the carnival thinning as the night wore on. He was laughing with Marcus, the easy full laugh that required no maintenance, no calculation. He saw her coming and the laugh finished on its own schedule and he turned to her with the easy smile \u2014 the one she had replayed forty-four times.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker rein\">Rein</span>\n  <div class=\"dl-text rein\">\"Hey \u2014 where'd you go? You okay? You look\u2014\"</div>\n</div>\n\n<p>She cut him off. Not loudly. Just because she had decided, somewhere between the stall and the ferris wheel, that she was done managing the temperature of every sentence.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"There's a bet.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker rein\">Rein</span>\n  <div class=\"dl-text rein\">\"What\u2014\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"In your groupchat. Side A, side B. Whether I fall for you first or we become official. Someone put two hundred pesos on Side B. That was the easy bet, apparently.\"</div>\n</div>\n\n<p>The group went quiet. Not dramatically \u2014 but the ones nearby heard. Rein's face did the sequence of someone receiving information they had been comfortable not confronting, required now to confront it in public. The inconvenience first. Then the beginning of defensiveness.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker rein\">Rein</span>\n  <div class=\"dl-text rein\">\"Can we not do this here\u2014\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"Were you ever serious about me.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker rein\">Rein</span>\n  <div class=\"dl-text rein\">\"I never said we were anything.\"</div>\n</div>\n\n<p>He said it carefully. Not cruelly \u2014 that would have been easier to receive. Carefully. The precisely minimal answer that was technically true and left him completely clean and left her with nothing.</p>\n\n<p>Someone laughed. A small sound, immediately stifled. She heard it.</p>\n\n<p>That sound. That was the one. Not the words. Not the deflection. The tiny, suppressed laugh of someone in the audience of a scene who had seen this coming and was experiencing the low-grade satisfaction of a prediction confirmed.</p>\n\n<p>Two hundred pesos. Side B.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"I spent months learning your group. Learning what makes you all laugh, what references to have ready, how to take up less space so you wouldn't find me too much.\"</div>\n</div>\n\n<p>Her voice was steady. The specific steadiness that arrives on the other side of humiliation when you have nothing left to protect.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"I stopped talking to my best friend for you. She told me the truth about you and I chose you over her. I showed up everywhere you were. I wore yellow tonight because I thought\u2014\"</div>\n</div>\n\n<p>She stopped. She had almost said it \u2014 the full version, the reason for the dress, the specific night she had been building toward. She was not going to give them that. She had given them enough already.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"You kissed me. And I thought it meant you were choosing me.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker rein\">Rein</span>\n  <div class=\"dl-text rein\">\"I never said\u2014\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"I know. You never said anything. You just let me keep hoping. And everyone around you knew I was hoping and nobody said anything. You let your friends make a bet. You let me make myself smaller every week so I could fit into a group that was never going to fully let me in anyway. And the whole time the joke was me.\"</div>\n</div>\n\n<p>Rein looked at the ground. Not meeting her eyes \u2014 the specific avoidance of someone who cannot handle the thing they caused and has chosen the floor as the next best option. Something had crossed his face earlier, briefly \u2014 something that looked almost like regret. The regret of someone who had never intended to be a villain, who had made a hundred small careless decisions without thinking about the person on the other end of them, and was now standing in the full consequence of all of them at once.</p>\n\n<p>Then the moment passed.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker rein\">Rein</span>\n  <div class=\"dl-text rein\">\"Is it my fault you caught feelings?\"</div>\n</div>\n\n<p>The crowd around them was quiet. The ferris wheel turned. The lights moved, amber and white, the slow indifferent rotation of something that kept going regardless.</p>\n\n<p>Lauren looked at him one last time. The full version \u2014 not performing it, not hoping anything behind it. Just looking at him the way she had been looking at him for months, except the hope was gone from it now, and without the hope she could see him very clearly. Just a person. Handsome, easy, careless in the specific way of someone who had never had to be careful because things had always arranged themselves conveniently around him. A person she had been rearranging herself around for months.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker lauren\">Lauren</span>\n  <div class=\"dl-text lauren\">\"No. It's not your fault I felt something. But it is your fault you let me keep feeling it without telling me the truth. And it is your fault you let your friends bet on it. And it is your fault I'm standing here in this dress finding out that everyone saw this coming and I was the only one who didn't.\"</div>\n</div>\n\n<p>She picked up her bag. Turned around. The rain had been starting while they were talking \u2014 she hadn't noticed it, had been too inside the conversation. Real now, steady, the kind that soaked through things quickly. The lights scattered across the wet ground in pieces.</p>\n\n<p>She walked into it.</p>\n\n<div class=\"silent\" style=\"animation-delay:0.1s\">\n  <p>She cried before she reached the edge of the carnival. Not the performing kind, not the holding-back kind. Just: tears arriving because the container for them had been full for a long time and the lid had finally come off.<br><br>\n  The yellow dress.<br><br>\n  She had been wearing yellow for him since she got here.<br><br>\n  Yes. She had. She had worn yellow because she had decided, three weeks ago in a shop window, that there was a night this dress was for. And she had been right. There was a night it was for.<br><br>\n  It just wasn't the night she imagined.<br><br>\n  This was it. The yellow dress, the rain, the ferris wheel turning behind her. The knowledge that the joke had always had a side A and a side B and she had been living inside the punchline, too warm in it to notice it burning.</p>\n</div>\n\n<div class=\"dean-narrate\">\n  <p>I watched her walk out of the carnival. The yellow dress in the rain. The way she held herself \u2014 not collapsed, just: a person walking through weather, putting one foot in front of the other, moving toward somewhere that was not here.</p>\n  <p>I wanted to go after her. I stood there and wanted to, very specifically, go after her and say: I saw the whole thing. You were not stupid. You were not the problem. You were someone who loved with your whole capacity and it was not returned and that is a tragedy that belongs to him, not to you.</p>\n  <p>I didn't go. Because Lauren needed to be in the rain alone for a little while. Some things require the specific privacy of walking away while the thing is still visible behind you, with nobody following yet.</p>\n  <p>She would find Abby. Or Abby would find her. That was the thing about the two of them \u2014 even their distances were temporary.</p>\n  <p>But for now: yellow dress, rain, carnival going quiet.</p>\n  <p>For now: this.</p>\n</div>\n\n<p class=\"line\">She walked until the lights were behind her.</p>\n<p class=\"line\">Until the music became just a suggestion of music.</p>\n<p class=\"line\">Until the rain had soaked through everything.</p>\n<p class=\"line\">And underneath the humiliation, the grief of it \u2014</p>\n<p class=\"line\">something small, not yet named:</p>\n<p class=\"line\"><em>the specific relief of someone who has finally stopped holding onto something that was never holding back.</em></p>\n<p class=\"line\"><em>The thing that happens after the caramel burns.</em></p>\n<p class=\"line\"><em>When the heat is finally off.</em></p>\n<p class=\"line\"><em>And you can breathe again.</em></p>\n\n<div class=\"rxns\">\n  <span class=\"rx\">&#129655; \"side A and side B\"</span>\n  <span class=\"rx\">&#128148; \"she's been wearing yellow for him\"</span>\n  <span class=\"rx\">&#128557; easy money</span>\n  <span class=\"rx\">\u2728 \"the same look without the hope\"</span>\n  <span class=\"rx\">&#128257; the yellow dress in the rain</span>\n  <span class=\"rx\">&#129293; finally stopped holding on</span>\n</div>\n\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#129655;</span>\n  <p class=\"end-title\">\u2014 end of lauren's chapter eight \u2014</p>\n  <p class=\"end-meta\">\n    for the ones who wore yellow<br>\n    for someone who never even noticed the color. &#129293;<br><br>\n    <em>next: Chapter 8 \u2013 \"He Was Never Abroad\" \u00b7 Abby</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; &#129655;</span>\n</div>\n\n</div>\n\n</body>\n</html>",
  carlo: "\n\n\n<div class=\"cold-open\" style=\"animation-delay:0.35s\">\n  <span class=\"cold-open-tag\">dean reyes &nbsp;\u00b7&nbsp; narrator &nbsp;\u00b7&nbsp; caramel night</span>\n  <p>I almost didn't recognize him at first. That's the part I keep thinking about. I was scanning the carnival at around eight, doing the thing I always do \u2014 watching, cataloguing \u2014 and I saw the bear mascot near the children's section and almost moved on. Then something about the posture. The specific way he stood between children, slightly forward, the quality of attention in even the costume's body language.</p>\n  <p>I've been watching Carlo for long enough to recognize the way he holds himself when he is managing something. Even through foam and fabric.</p>\n  <p>I stopped. I watched him for a while. He didn't see me. Nobody saw him. That was the whole point. That was the most Carlo thing possible \u2014 to be the most visible person in a section of the carnival and simultaneously the most invisible. To be giving people joy from inside a costume that made him anonymous. To be the container, again, for everyone else's good time, while whatever was happening inside the container stayed entirely private.</p>\n  <p>I didn't know yet what he was carrying. By the end of the night I would understand it was more than any of us had known.</p>\n</div>\n\n<div class=\"silent\" style=\"animation-delay:0.4s\">\n  <p>Nobody knew it was Carlo inside the costume.<br><br>\n  That's the part that matters most.<br><br>\n  Nobody knew.</p>\n</div>\n\n<div class=\"sec-head\" style=\"animation-delay:0.4s\">\n  <span class=\"sec-num\">One</span>\n  <span class=\"sec-title\">The Mascot Raket</span>\n</div>\n\n<span class=\"scene-label\">Children's Section \u00b7 Carnival \u00b7 7:00 PM</span>\n\n<p class=\"opener\">I almost missed him. That is the part I keep coming back to. I was scanning the carnival at around eight \u2014 doing the thing I always do, watching, cataloguing, the half-step remove \u2014 and I saw the bear mascot near the children's section and almost moved on. Then something about the posture. The specific way he stood between children, slightly forward, the quality of attention in even the costume's body language.</p>\n\n<p>I've known Carlo long enough to recognize the way he holds himself when he is managing something. Even through foam and fabric. I stopped. I watched him for a while from across the section. He didn't see me. Nobody saw him. That was the whole point \u2014 that was the most Carlo thing possible, and also the most heartbreaking thing I watched all night before I even knew what the night was going to become.</p>\n\n<p>He had taken the raket three weeks ago. Two hundred pesos an hour, org mascot, children's section, balloons and photos. He had said yes because that's how Carlo moved through the world \u2014 saying yes to things, filling in the gaps, being the person who showed up. Inside the costume, he told me later, the heat was immediate. The foam head reduced his field of vision to a small oval. The carnival sounds arrived muffled and slightly delayed, like a radio station just out of range.</p>\n\n<p>He gave away balloons. Children ran up and grabbed them and ran back to their parents. Some hugged him \u2014 the small, fierce hugs of children who had decided a bear in a foam costume was trustworthy, no evidence required. He crouched to their height and held out balloons with both hands and thought: <em>this is the most visible I've been all night and nobody can see me at all.</em></p>\n\n<div class=\"dean-narrate\">\n  <p>I watched him work the section for about twenty minutes. The care he put into it \u2014 the same care he put into everything, the Float shifts, the Thursday visits, the listening. Inside the costume he was completely anonymous, and yet the quality of the attention was unmistakably his. That's the thing about Carlo. You can put him in a bear suit and he still does the work completely. He still shows up fully. He doesn't know how to do anything else.</p>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Two</span>\n  <span class=\"sec-title\">What He Heard</span>\n</div>\n\n<span class=\"scene-label\">Near the Food Stalls \u00b7 9:00 PM</span>\n\n<p>I was near the food stalls \u2014 not near Carlo, not watching him specifically \u2014 when I heard Mira's voice. I recognized it the same way he must have recognized it from inside the costume: before I saw her, before I located her in the crowd, just the voice arriving and the immediate understanding of whose it was.</p>\n\n<p>I found her with my eyes. Three tables away. A friend beside her. The easy warmth of two people having a light Saturday evening with nowhere complicated to be.</p>\n\n<p>I looked for Carlo. I couldn't see the costume from where I was. I didn't know, then, that he could hear her. I didn't know he was close enough. By the time I understood, it was already done.</p>\n\n<div class=\"mira-overheard\" style=\"animation-delay:0.1s\">\n  <span class=\"mira-label\">overheard \u00b7 food stalls \u00b7 9:04 PM</span>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker mira-friend\">Friend</span>\n    <div class=\"dl-text mira-friend\">\"You still talk to Carlo?\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker mira\">Mira</span>\n    <div class=\"dl-text mira\">\"Not really. It just \u2014 it was getting too heavy. You know.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker mira-friend\">Friend</span>\n    <div class=\"dl-text mira-friend\">\"Yeah.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker mira\">Mira</span>\n    <div class=\"dl-text mira\">\"Like \u2014 what was I supposed to do. Be twenty-two forever waiting around for someone to finish taking care of everybody else first? I have my own life.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker mira-friend\">Friend</span>\n    <div class=\"dl-text mira-friend\">\"He was always with his lola.\"</div>\n  </div>\n  <div class=\"dl-wrap\" style=\"opacity:1;animation:none\">\n    <span class=\"dl-speaker mira\">Mira</span>\n    <div class=\"dl-text mira\">\"Which I get. I do. But I couldn't compete with that. I didn't even want to compete with that. I just needed someone who had room for me. And he just \u2014 didn't.\"</div>\n  </div>\n</div>\n\n<p>She was not being cruel. I want to be clear about that. She was telling the truth about herself \u2014 what she needed, what she couldn't get, why she left. The truth was fair. The truth was completely, uncomplicatedly correct.</p>\n\n<p>The truth was also landing on Carlo from inside a foam bear costume, alone, sweating, with no ability to respond or breathe or be seen.</p>\n\n<p>I didn't go to him. I didn't know where he was. By the time I understood what had happened, Mira had moved on to the next topic and Carlo was somewhere in the children's section holding balloons, and the thing had already done what it did, and there was nothing I could have done about any of it.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Three</span>\n  <span class=\"sec-title\">The Message</span>\n</div>\n\n<span class=\"scene-label\">Children's Section \u00b7 9:47 PM</span>\n\n<p>He found me after. Not right away \u2014 first there was the phone message, and then the rain, and then the standing alone in the costume while the carnival thinned out around him. He found me at the edge of the park at around ten-fifteen, still in parts of the costume \u2014 he had taken the head off, was carrying it under one arm, the rest of the suit still on because he hadn't had a place to change yet.</p>\n\n<p>His face. I had never seen Carlo's face look like that. Not the grief of it \u2014 I had seen Carlo grieve before, the quiet managed kind. This was different. This was the face of someone who has had too many things arrive at once and the usual architecture for holding them has not been enough.</p>\n\n<p>He showed me the phone. I read the message.</p>\n\n<div class=\"notification-card\" style=\"animation-delay:0.1s\">\n  <span class=\"notif-icon\">&#128241;</span>\n  <p class=\"notif-text\">\n    <strong>St. Theresa's Care Home</strong> &nbsp;\u00b7&nbsp; 9:43 PM<br><br>\n    \"Carlo. Please call us when you can. It's about Lola Celia.<br>\n    She passed away peacefully at 9:15 tonight.<br>\n    We're so sorry.\"\n  </p>\n</div>\n\n<p>9:15. He had been in the children's section at 9:15. Giving balloons to children who didn't know his name. Standing in the muffled quiet of the foam costume while the world outside continued at full volume. She had gone at 9:15 and he had not known. He had been there and not known.</p>\n\n<p>I didn't say anything immediately. There was nothing to say. I just stood there with him and let the silence be what it was \u2014 the specific silence of two people who are both understanding something at the same time and don't yet have the words for it.</p>\n\n<p>After a while he said: <em>she was asking about Mira last Thursday.</em></p>\n\n<p>I said: I know.</p>\n\n<p>He said: <em>she had the blue cardigan on. For Mira.</em></p>\n\n<p>I said: I know.</p>\n\n<p>He said: <em>she told me I didn't have to be strong all the time.</em></p>\n\n<p>And then he stopped talking. And I stood next to him at the edge of the carnival park while the rain came down and the lights behind us went softer and the rides stopped one by one, and I did not tell him it would be okay \u2014 because I did not know if it would be okay in the way he needed it to be, and the least I could do was not lie to him about that.</p>\n\n<div class=\"dean-narrate\">\n  <p>He is the person who holds things for everyone. He has been doing it his whole life \u2014 the bar shifts, the Thursday visits, the careful management of every room he walks into so that everyone in it can be okay. He has been the container. He has never, in all the time I have known him, asked to be carried.</p>\n  <p>I made a decision standing there in the rain. I am going to be the person who does for Carlo what he does for everyone else. I don't know exactly what that looks like yet. But I know I am not going to let him keep being the only one who shows up.</p>\n  <p>That is a promise I am making to him and also to myself. Tonight, in the rain, at the edge of the carnival. I am writing it down so I don't forget.</p>\n</div>\n\n<div class=\"final-image\" style=\"animation-delay:0.1s\">\n  <span class=\"final-image-label\">caramel night \u00b7 final image \u00b7 10:02 PM \u00b7 before I found him</span>\n  <p>One mascot. Standing still in the rain while everything around him moved toward shelter.<br><br>\n  No children left. No balloons \u2014 they had gone up into the rain, yellow and red and blue, rising into the dark until they disappeared.<br><br>\n  The phone still in the gloved hand. The message still on the screen.<br><br>\n  Inside: a person who had been the container for everyone else's grief for so long that he had never learned what to do when the grief arrived for him.<br><br>\n  Learning now.<br><br>\n  And I had almost walked past without looking twice.</p>\n</div>\n\n<div class=\"chapter-close\" style=\"animation-delay:0.1s\">\n  <span class=\"chapter-close-label\">caramel night \u00b7 what was lost</span>\n  <p class=\"chapter-close-text\">\n    Lauren lost the fantasy she had been building for months.<br>\n    Abby lost the version of herself that believed she was the problem.<br>\n    I lost the possibility of a thing that had never been possible.<br>\n    Owen lost the illusion that presence was enough to make someone stay.<br>\n    Carlo lost everything at once.<br><br>\n    And somewhere above the carnival,<br>\n    five yellow balloons were still rising.<br>\n    Going somewhere none of us could follow.<br>\n    Into the dark. Into the rain. Gone.<br><br>\n    We stood at the edge of the park, Carlo and I,<br>\n    while the city kept going around us.<br>\n    That's what cities do.<br>\n    They keep going.<br>\n    Eventually you learn to keep going with them.\n  </p>\n</div>\n\n<div class=\"rxns\">\n  <span class=\"rx\">&#128155; nobody knew it was carlo</span>\n  <span class=\"rx\">&#128148; \"he just didn't have room\"</span>\n  <span class=\"rx\">&#128557; the message at 9:43</span>\n  <span class=\"rx\">\u2728 the balloons going up</span>\n  <span class=\"rx\">&#128257; \"just us is fine\"</span>\n  <span class=\"rx\">&#129293; learning now</span>\n</div>\n\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#128155;</span>\n  <p class=\"end-title\">\u2014 end of chapter eight \u2014</p>\n  <p class=\"end-meta\">\n    caramel night:<br>\n    the night sweetness burned.<br><br>\n    they all lost something.<br>\n    some of them lost more than one thing.<br>\n    some things don't come back.<br><br>\n    but the carnival kept going<br>\n    for a little while longer. &#129293;<br><br>\n    <em>next: Chapter 9 \u2014 coming soon</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; &#128155;</span>\n</div>\n\n</div>\n\n</body>\n</html>",
  owen: "\n\n\n<div class=\"cold-open\" style=\"animation-delay:0.35s\">\n  <span class=\"cold-open-tag\">dean reyes &nbsp;\u00b7&nbsp; narrator &nbsp;\u00b7&nbsp; caramel night</span>\n  <p>Owen finished his song at eight-forty-five. I was near the stage for it. I heard the whole thing \u2014 the finished version, the one with the fourth line finally in place, the one that had been waiting to be completed since the night outside Float when Alex kissed him and stepped back and said: don't get attached to temporary things.</p>\n  <p>It was a good song. It was an honest song. It was the kind of song that becomes good specifically because it hurt to write \u2014 you can always tell, when someone is playing from that place. The crowd went quiet for it. That's the real measure.</p>\n  <p>He stepped off the stage. He saw her in the crowd. And everything that had been resolved in the writing of the song became unresolved in the seeing of her face.</p>\n  <p>That's the thing about closure. It only holds until the person shows up.</p>\n</div>\n\n<div class=\"sec-head\" style=\"animation-delay:0.4s\">\n  <span class=\"sec-num\">One</span>\n  <span class=\"sec-title\">The Song</span>\n</div>\n\n<span class=\"scene-label\">Carnival Stage \u00b7 Saturday \u00b7 8:45 PM</span>\n\n<p class=\"opener\">I was near the stage for Owen's set. I had been making my way through the carnival \u2014 checking in on everyone the way I do, the half-step observer, the person who was always slightly outside the main action \u2014 and I ended up near the open mic area at eight-forty-five when the band got on.</p>\n\n<p>I had heard the unfinished song before. Fragments of it, from the practice room, from the times Owen had played something and then stopped and I'd been close enough to hear the stopping. I had watched that song not get finished for two months. I knew what it was about without being told \u2014 I knew from the fourth line that kept not arriving, from the way he played the opening chord and went still in it, from the particular quality of something being held open waiting for the last piece.</p>\n\n<p>Tonight it was finished.</p>\n\n<p>He played the whole thing. The fourth line was in. The song was complete \u2014 the specific completeness of something that took its time becoming what it was. The crowd went quiet for it. Real quiet, not polite quiet. That's the measure. When a room goes genuinely still for someone playing, you know the something that got into the song got into the room too.</p>\n\n<p>He stepped off stage. Put Cassiopea in her case with the careful hands he always used for her. Looked up.</p>\n\n<p>And saw Alex in the crowd.</p>\n\n<p>I saw his face change from about fifteen meters away. The lean forward, slight. Then the stillness. The specific stillness of a person whose body has recognized something before the brain has finished deciding what to do about it. I watched him decide \u2014 in real time, across the noise of a carnival \u2014 to walk toward her.</p>\n\n<p>I didn't follow. Some conversations belong only to the people having them.</p>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Two</span>\n  <span class=\"sec-title\">She Was There</span>\n</div>\n\n<span class=\"scene-label\">Near the Stage \u00b7 9:05 PM</span>\n\n<p>He told me what happened after. Not that same night \u2014 that night he was somewhere private and unreachable, the way people are when they've just had the large conversation they needed to have and need time before they can hand the shape of it to anyone else. He told me the next morning, in pieces, over the phone, in the flat, tired voice of someone who had slept a few hours and was still processing.</p>\n\n<p>She had come on purpose. She knew he'd be performing. She had unblocked herself long enough to check the org's event page, and then she'd come, because she had something she owed him and she knew it and she was the kind of person who paid what she owed even when it was hard.</p>\n\n<p>That detail matters to me. She didn't have to come back. She could have stayed gone, let the block be the whole ending, let Owen spend the rest of this semester and maybe longer wondering what he had done wrong. She chose not to do that. She came back to give him the true version. That is a specific kind of care \u2014 the care of someone who knows they hurt you and comes back anyway, not to fix it, just to make sure you have the honest account.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"You came.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"I wanted to hear the song. The one you were writing.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"You blocked me.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"I know. I was going to keep responding if I didn't. I needed to stop responding.\"</div>\n</div>\n\n<p>And then she told him. He said she was direct about it \u2014 not performing honesty, not making a speech, just: the facts of it. The person before him. The not-being-over-it. The reaching toward Owen as a way of trying to reach past the person she couldn't stop thinking about.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"You're not the problem, Owen. I want to say that first.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"I was with someone before you. We ended badly \u2014 or we didn't really end. He just left without actually leaving. And I've been trying to get over it for a year and not really getting anywhere.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"And did it help. Being with me.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"Sometimes when I kissed you \u2014 sometimes he was still there. In the back of it. And I couldn't make him leave.\"</div>\n</div>\n\n<p>He said there was a long silence after that. The carnival continuing around them, indifferent.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"You used me to forget him.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"I used you to try. I'm not sure I forgot anything.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"Why me.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"Because you're kind. And I knew you'd care. And I needed someone to care even if I couldn't care back the right way.\"</div>\n</div>\n\n<div class=\"hugot\">\n  <p>She told him the truth. That is the thing to hold onto, underneath all of it. She came back to say it. She didn't have to. She came back because she owed him the real thing and she knew it. That doesn't make it not hurt. But it means something.</p>\n  <div class=\"hugot-line\"></div>\n</div>\n\n<div class=\"brk\">\u00b7 \u00b7 \u00b7</div>\n\n<div class=\"sec-head\">\n  <span class=\"sec-num\">Three</span>\n  <span class=\"sec-title\">What He Said Back</span>\n</div>\n\n<span class=\"scene-label\">Rain \u00b7 9:28 PM</span>\n\n<p>They were both wet by then. He said neither of them moved to get out of the rain, which felt right to him \u2014 the conversation required the discomfort. It should not be had somewhere dry and managed.</p>\n\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"You told me not to get attached to temporary things.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"I was trying to warn you. I'm not good at being honest and self-deprecating at the same time.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"Did any of it mean anything. To you.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"Yes. That's the part that made it so unfair.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"I wrote a song about you. I thought if I could find the right line, the thing would resolve. Music has rules. There's a logic. If you find the right note in the right place, the song becomes complete.\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker alex\">Alex</span>\n  <div class=\"dl-text alex\">\"And?\"</div>\n</div>\n<div class=\"dl-wrap\">\n  <span class=\"dl-speaker owen\">Owen</span>\n  <div class=\"dl-text owen\">\"People aren't songs.\"</div>\n</div>\n\n<p>She laughed. He said it was not a bad laugh \u2014 the specific laugh of someone who has just recognized something true, who is allowed to find it a little funny even in the middle of everything else. She said sorry. He said thank you for coming back to say it. She looked at him like she hadn't expected that. She nodded, pulled her jacket tighter, and walked back toward the carnival.</p>\n\n<p>He watched her go.</p>\n\n<div class=\"silent\" style=\"animation-delay:0.1s\">\n  <p>He stood in the rain after she was gone and he told me the next morning that the song was finished before tonight \u2014 he'd known the ending, written it, let it be complete. But standing there in the rain with the truth of it said out loud and absorbed, he understood something about the song he hadn't understood when he wrote it.<br><br>\n  It wasn't about Alex. It was about what he'd been trying to do with Alex \u2014 the reaching, the hoping, the belief that if he was present enough and kind enough, warmth would become something real. That wasn't about her. That was about him.<br><br>\n  He'd been writing about himself the whole time.</p>\n</div>\n\n<p>He was still standing in the rain when Abby found him. I watched them from across the carnival \u2014 both soaked, both at the end of something, holding on. I didn't go over immediately. I gave them the moment. Some things need to be witnessed from a distance before they can be shared.</p>\n\n<p class=\"line\">The song was finished.</p>\n<p class=\"line\">Cassiopea was in her case on the stage.</p>\n<p class=\"line\">The fourth line was no longer missing.</p>\n<p class=\"line\"><em>He told me later: I think I'm going to be okay.</em></p>\n<p class=\"line\"><em>I told him: I know.</em></p>\n<p class=\"line\"><em>Not tonight. But eventually.</em></p>\n<p class=\"line\"><em>Eventually is enough.</em></p>\n\n<div class=\"rxns\">\n  <span class=\"rx\">&#127928; the finished song</span>\n  <span class=\"rx\">&#128153; \"sometimes he was still there\"</span>\n  <span class=\"rx\">&#128557; \"you used me to forget\"</span>\n  <span class=\"rx\">\u2728 \"people aren't songs\"</span>\n  <span class=\"rx\">&#128257; abby in the rain</span>\n  <span class=\"rx\">&#129293; the song was done</span>\n</div>\n\n<div class=\"end-card\">\n  <span class=\"end-emoji\">&#127928;</span>\n  <p class=\"end-title\">\u2014 end of owen's chapter eight \u2014</p>\n  <p class=\"end-meta\">\n    for the ones who wrote the whole song<br>\n    for someone who was listening to someone else. &#129293;<br><br>\n    <em>next: Chapter 8 \u2013 \"Inside the Costume\" \u00b7 Carlo</em>\n  </p>\n  <span class=\"vote-btn\">\u2b50 Vote &nbsp;\u00b7&nbsp; &#127928;</span>\n</div>\n\n</div>\n\n</body>\n</html>"
